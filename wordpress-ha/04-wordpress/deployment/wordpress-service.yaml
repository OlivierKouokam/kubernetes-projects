# =============================================================
# Service WordPress — NodePort pour tests
#
# Expose WordPress sur le port 30080 de tous les nœuds.
#
# Accès :
#   http://<NODE_IP>:30080        → Frontend WordPress
#   http://<NODE_IP>:30080/wp-admin → Administration
#
# ⚠️  WP_HOME et WP_SITEURL dans wp-config.php doivent
#     correspondre à cette URL pour que les redirections
#     et les assets fonctionnent correctement.
# =============================================================

apiVersion: v1
kind: Service
metadata:
  name: wordpress-service
  namespace: wordpress-ha
  labels:
    app: wordpress
    app.kubernetes.io/part-of: wordpress-ha-stack
    app.kubernetes.io/component: wordpress
spec:
  type: NodePort
  selector:
    app: wordpress
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
  # sessionAffinity : les sessions collantes ne sont PAS nécessaires
  # car WordPress utilise Redis pour le cache des sessions
  sessionAffinity: None
