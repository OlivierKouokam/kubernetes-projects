# =============================================================
# HorizontalPodAutoscaler — WordPress
#
# Scale automatiquement le nombre de pods WordPress
# en fonction de la charge CPU et mémoire.
#
# Seuils :
#   - CPU > 70%  → scale up
#   - CPU < 70%  → scale down (après stabilisation)
#   - Mémoire > 80% → scale up
#
# Limites :
#   - Min : 2 pods (HA garantie)
#   - Max : 10 pods (à adapter selon les ressources du cluster)
#
# Comportement scale-down :
#   - Fenêtre de stabilisation : 5 minutes
#   - Évite les oscillations rapides up/down
#
# Prérequis :
#   - metrics-server installé dans le cluster
#   kubectl top pods -n wordpress-ha  (doit fonctionner)
# =============================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wordpress-hpa
  namespace: wordpress-ha
  labels:
    app: wordpress
    app.kubernetes.io/part-of: wordpress-ha-stack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wordpress

  minReplicas: 2      # Toujours au moins 2 pods (HA)
  maxReplicas: 10     # Maximum 10 pods

  metrics:
    # Metric 1 : CPU
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70    # Scale up si CPU moyen > 70%

    # Metric 2 : Mémoire
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80    # Scale up si RAM moyenne > 80%

  behavior:
    # Scale UP : réactif (trafic soudain)
    scaleUp:
      stabilizationWindowSeconds: 60     # Attendre 1 min avant de scale up
      policies:
        - type: Pods
          value: 2                         # Ajouter max 2 pods à la fois
          periodSeconds: 60
        - type: Percent
          value: 50                        # Ou +50% du nombre actuel
          periodSeconds: 60
      selectPolicy: Max                    # Prendre la politique la plus agressive

    # Scale DOWN : conservateur (éviter les oscillations)
    scaleDown:
      stabilizationWindowSeconds: 300    # Attendre 5 min avant de scale down
      policies:
        - type: Pods
          value: 1                         # Supprimer max 1 pod à la fois
          periodSeconds: 120              # Toutes les 2 minutes
      selectPolicy: Min                    # Politique la plus conservative
