# =============================================================
# Secrets WordPress
#
# Contient :
#   1. Credentials DB MySQL (réf. Phase 1)
#   2. Credentials Redis Sentinel (réf. Phase 2)
#   3. Credentials MinIO WordPress user (réf. Phase 3)
#   4. WordPress Auth Keys & Salts (sécurité sessions/cookies)
#
# Générer de nouvelles salts :
#   curl -s https://api.wordpress.org/secret-key/1.1/salt/
#
# ⚠️  À changer IMPÉRATIVEMENT en production
# =============================================================

apiVersion: v1
kind: Secret
metadata:
  name: wordpress-secrets
  namespace: wordpress-ha
  labels:
    app.kubernetes.io/part-of: wordpress-ha-stack
    app.kubernetes.io/component: wordpress
type: Opaque
stringData:
  # ── MySQL (Phase 1) ──────────────────────────────────────
  db-host:     "mycluster-router-service"
  db-port:     "3306"
  db-name:     "wordpress_db"
  db-user:     "wordpress"
  db-password: "WPdbP@ss2024!"

  # ── Redis Sentinel (Phase 2) ─────────────────────────────
  redis-password: "RedisSent!n3l2024"

  # ── MinIO (Phase 3) ──────────────────────────────────────
  minio-access-key: "wp-minio-user"
  minio-secret-key: "WPMinIO!S3c2024"

  # ── WordPress Auth Keys & Salts ──────────────────────────
  # Valeurs générées via https://api.wordpress.org/secret-key/1.1/salt/
  # (les valeurs ci-dessous sont des exemples — à régénérer !)
  auth-key:             "put-your-unique-phrase-here-auth-key"
  secure-auth-key:      "put-your-unique-phrase-here-secure-auth-key"
  logged-in-key:        "put-your-unique-phrase-here-logged-in-key"
  nonce-key:            "put-your-unique-phrase-here-nonce-key"
  auth-salt:            "put-your-unique-phrase-here-auth-salt"
  secure-auth-salt:     "put-your-unique-phrase-here-secure-auth-salt"
  logged-in-salt:       "put-your-unique-phrase-here-logged-in-salt"
  nonce-salt:           "put-your-unique-phrase-here-nonce-salt"
