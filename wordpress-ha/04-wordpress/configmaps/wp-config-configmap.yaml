# =============================================================
# ConfigMap — wp-config.php
#
# Injecté dans le container WordPress via un volume mount.
# Les valeurs sensibles sont lues depuis le Secret wordpress-secrets
# via des variables d'environnement (pattern envFrom + env).
#
# Ce fichier configure :
#   - Connexion MySQL via MySQLRouter (Phase 1)
#   - Redis Object Cache en mode Sentinel (Phase 2)
#   - WP Offload Media vers MinIO S3 (Phase 3)
#   - WordPress en mode HA stateless (table prefix, debug off...)
#   - Reverse proxy / load balancer awareness
# =============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: wordpress-config
  namespace: wordpress-ha
  labels:
    app.kubernetes.io/part-of: wordpress-ha-stack
    app.kubernetes.io/component: wordpress
data:
  wp-config.php: |
    <?php
    /**
     * WordPress HA Configuration
     * Stack : MySQL InnoDB Cluster + Redis Sentinel + MinIO
     * Kubernetes namespace : wordpress-ha
     */

    // ── Database (MySQL InnoDB Cluster via MySQLRouter) ────────
    // MySQLRouter route automatiquement vers le primary actuel
    // En cas de failover, la reconnexion est transparente
    define( 'DB_NAME',     getenv('WORDPRESS_DB_NAME')     ?: 'wordpress_db' );
    define( 'DB_USER',     getenv('WORDPRESS_DB_USER')     ?: 'wordpress' );
    define( 'DB_PASSWORD', getenv('WORDPRESS_DB_PASSWORD') ?: '' );
    define( 'DB_HOST',     getenv('WORDPRESS_DB_HOST')     ?: 'mycluster-router-service:3306' );
    define( 'DB_CHARSET',  'utf8mb4' );
    define( 'DB_COLLATE',  'utf8mb4_unicode_ci' );

    // ── Auth Keys & Salts ──────────────────────────────────────
    // Injectées depuis le Secret wordpress-secrets
    define( 'AUTH_KEY',         getenv('WP_AUTH_KEY')         ?: 'change-me' );
    define( 'SECURE_AUTH_KEY',  getenv('WP_SECURE_AUTH_KEY')  ?: 'change-me' );
    define( 'LOGGED_IN_KEY',    getenv('WP_LOGGED_IN_KEY')    ?: 'change-me' );
    define( 'NONCE_KEY',        getenv('WP_NONCE_KEY')        ?: 'change-me' );
    define( 'AUTH_SALT',        getenv('WP_AUTH_SALT')        ?: 'change-me' );
    define( 'SECURE_AUTH_SALT', getenv('WP_SECURE_AUTH_SALT') ?: 'change-me' );
    define( 'LOGGED_IN_SALT',   getenv('WP_LOGGED_IN_SALT')   ?: 'change-me' );
    define( 'NONCE_SALT',       getenv('WP_NONCE_SALT')       ?: 'change-me' );

    // ── Table prefix ───────────────────────────────────────────
    $table_prefix = 'wp_';

    // ── Redis Object Cache — Mode Sentinel ────────────────────
    // Plugin requis : Redis Object Cache (Till Krüss)
    // Le client predis supporte nativement le mode Sentinel
    //
    // WordPress interroge les Sentinels pour découvrir le master
    // actuel — le failover est donc transparent pour WordPress.
    define( 'WP_REDIS_CLIENT',   'predis' );
    define( 'WP_REDIS_SENTINEL', 'mymaster' );
    define( 'WP_REDIS_SENTINELS', [
        'tcp://redis-sentinel-service:26379',
    ] );
    define( 'WP_REDIS_PASSWORD',     getenv('REDIS_PASSWORD') ?: '' );
    define( 'WP_REDIS_DATABASE',     0 );
    define( 'WP_REDIS_TIMEOUT',      1 );
    define( 'WP_REDIS_READ_TIMEOUT', 1 );
    define( 'WP_REDIS_RETRY_INTERVAL', 100 );
    define( 'WP_REDIS_MAXTTL',       86400 );     // 24h max TTL cache

    // Cache groups exclus du cache Redis
    // (transients critiques restent en DB pour la cohérence)
    define( 'WP_REDIS_IGNORED_GROUPS', [
        'counts', 'plugins', 'themes', 'comment', 'wc_session_id',
    ] );

    // ── MinIO S3 — WP Offload Media ───────────────────────────
    // Plugin requis : WP Offload Media Lite (deliciousbrains)
    // Configure l'accès S3 via variables d'environnement
    // (évite de stocker les credentials en clair dans wp-config)
    //
    // MinIO expose une API S3-compatible.
    // force-path-style=true est OBLIGATOIRE avec MinIO
    // (MinIO ne supporte pas le virtual-hosted-style par défaut)
    define( 'AS3CF_SETTINGS', serialize( [
        'provider'                  => 'aws',       // MinIO = AWS S3 compatible
        'access-key-id'             => getenv('MINIO_ACCESS_KEY') ?: '',
        'secret-access-key'         => getenv('MINIO_SECRET_KEY') ?: '',
        'bucket'                    => 'wp-uploads',
        'region'                    => 'us-east-1',
        // Endpoint interne Kubernetes vers MinIO
        'custom-domain'             => '',
        'endpoint'                  => 'http://minio-tenant-hl.wordpress-ha.svc.cluster.local:9000',
        'force-path-style'          => true,        // OBLIGATOIRE avec MinIO
        'copy-to-s3'                => true,        // Copier les uploads vers MinIO
        'serve-from-s3'             => true,        // Servir les médias depuis MinIO
        'remove-local-file'         => false,       // Garder copie locale (sécurité)
        'enable-object-prefix'      => true,
        'object-prefix'             => 'wp-content/uploads/',
        'use-yearmonth-folders'     => true,        // Organiser par année/mois
        'object-acl'                => 'public-read', // Médias publics
    ] ) );

    // ── WordPress HA — Configuration stateless ────────────────
    // WordPress doit être conscient qu'il tourne derrière
    // un load balancer / reverse proxy (Ingress ou NodePort)
    // pour générer les bonnes URLs (HTTP/HTTPS, host header)

    // Adapter l'IP/port selon votre environnement
    // En production avec Ingress : remplacer par le vrai domaine
    $node_ip = getenv('K8S_NODE_IP') ?: 'localhost';
    define( 'WP_HOME',    'http://' . $node_ip . ':30080' );
    define( 'WP_SITEURL', 'http://' . $node_ip . ':30080' );

    // Faire confiance aux headers X-Forwarded-For / X-Forwarded-Proto
    // envoyés par l'Ingress ou le NodePort
    if ( isset( $_SERVER['HTTP_X_FORWARDED_PROTO'] ) &&
         $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https' ) {
        $_SERVER['HTTPS'] = 'on';
    }

    // ── Filesystem ─────────────────────────────────────────────
    // WordPress stateless : les uploads vont directement vers MinIO
    // Pas besoin de ReadWriteMany PVC grâce au plugin WP Offload Media
    define( 'FS_METHOD', 'direct' );

    // ── Performance ────────────────────────────────────────────
    define( 'WP_MEMORY_LIMIT',       '256M' );
    define( 'WP_MAX_MEMORY_LIMIT',   '512M' );
    define( 'COMPRESS_CSS',          true );
    define( 'COMPRESS_SCRIPTS',      true );
    define( 'CONCATENATE_SCRIPTS',   false );  // Désactivé — risque avec Redis cache
    define( 'ENFORCE_GZIP',          true );

    // ── Révisions & Corbeille ──────────────────────────────────
    define( 'WP_POST_REVISIONS',     5 );      // Max 5 révisions par post
    define( 'EMPTY_TRASH_DAYS',      7 );      // Vider la corbeille après 7j
    define( 'AUTOSAVE_INTERVAL',     120 );    // Autosave toutes les 2 min

    // ── Cron ───────────────────────────────────────────────────
    // Désactiver le cron WordPress interne (déclenché par les visites)
    // En HA, plusieurs pods déclencheraient le cron simultanément
    // → utiliser un CronJob Kubernetes à la place (Phase E)
    define( 'DISABLE_WP_CRON', true );

    // ── Debug ──────────────────────────────────────────────────
    define( 'WP_DEBUG',         false );   // Activer temporairement pour debug
    define( 'WP_DEBUG_LOG',     false );
    define( 'WP_DEBUG_DISPLAY', false );
    define( 'SCRIPT_DEBUG',     false );

    // ── Sécurité ───────────────────────────────────────────────
    define( 'DISALLOW_FILE_EDIT',    true );   // Désactiver l'éditeur de fichiers
    define( 'DISALLOW_FILE_MODS',    false );  // Permettre les updates plugins (lab)
    define( 'FORCE_SSL_ADMIN',       false );  // Passer à true avec TLS

    // ── Bootstrap WordPress ────────────────────────────────────
    if ( ! defined( 'ABSPATH' ) ) {
        define( 'ABSPATH', __DIR__ . '/' );
    }
    require_once ABSPATH . 'wp-settings.php';
