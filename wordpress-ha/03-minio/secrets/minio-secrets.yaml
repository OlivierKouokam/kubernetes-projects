# =============================================================
# Secret 1 — Credentials root MinIO Tenant
#
# Utilisé par l'opérateur pour bootstrapper le Tenant.
# username : minio (root)
# password : MinIOr00t!2024
#
# echo -n 'minio'           | base64  → bWluaW8=
# echo -n 'MinIOr00t!2024'  | base64  → TWluSU9yMDB0ITIwMjQ=
# =============================================================

apiVersion: v1
kind: Secret
metadata:
  name: minio-root-credentials
  namespace: wordpress-ha
  labels:
    app.kubernetes.io/part-of: wordpress-ha-stack
    app.kubernetes.io/component: minio
type: Opaque
data:
  accesskey: bWluaW8=
  secretkey: TWluSU9yMDB0ITIwMjQ=

---
# =============================================================
# Secret 2 — Credentials WordPress pour accès MinIO
#
# Utilisé par WordPress (plugin WP Offload Media)
# Access Key : wp-minio-user
# Secret Key : WPMinIO!S3c2024
#
# echo -n 'wp-minio-user'  | base64  → d3AtbWluaW8tdXNlcg==
# echo -n 'WPMinIO!S3c2024' | base64 → V1BNaW5JTyFTM2MyMDI0
# =============================================================

apiVersion: v1
kind: Secret
metadata:
  name: minio-wp-credentials
  namespace: wordpress-ha
  labels:
    app.kubernetes.io/part-of: wordpress-ha-stack
    app.kubernetes.io/component: minio
type: Opaque
data:
  accesskey: d3AtbWluaW8tdXNlcg==
  secretkey: V1BNaW5JTyFTM2MyMDI0
