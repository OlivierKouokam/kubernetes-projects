# =============================================================
# MinIO Tenant — Mode distribué HA avec Erasure Coding
#
# Topologie :
#   - 1 pool de 4 serveurs (pods)
#   - 2 volumes (drives) par serveur → 8 drives au total
#   - Erasure Coding EC:4 → 4 drives data + 4 drives parité
#     → Tolérance : perte de jusqu'à 4 drives simultanés
#     → Tolérance : perte de jusqu'à 2 pods simultanés (sur 4)
#
# Pourquoi 4 pods minimum pour MinIO distribué ?
#   MinIO exige au moins 4 nœuds pour l'erasure coding.
#   En dessous, le mode standalone s'active (pas de HA).
#
# Stockage :
#   - 2 PVCs × 4 pods = 8 PVCs via StorageClass example-nfs
#   - 2Gi par PVC = 16Gi brut → ~8Gi utilisable (EC:4)
#
# Accès :
#   - API S3  : minio-tenant-hl:9000  (interne) / NodePort 30900 (test)
#   - Console : minio-tenant-console:9090 (interne) / NodePort 30901 (test)
# =============================================================

apiVersion: minio.min.io/v2
kind: Tenant
metadata:
  name: minio-tenant
  namespace: wordpress-ha
  labels:
    app.kubernetes.io/part-of: wordpress-ha-stack
    app.kubernetes.io/component: minio

spec:

  # ── Image MinIO ────────────────────────────────────────────
  image: minio/minio:RELEASE.2024-11-07T00-52-20Z
  imagePullPolicy: IfNotPresent

  # ── Credentials root (Secret existant) ────────────────────
  configuration:
    name: minio-root-credentials   # Secret contenant accesskey + secretkey

  # ── Pools (topologie de stockage) ─────────────────────────
  pools:
    - name: pool-0
      # 4 serveurs MinIO — minimum requis pour l'erasure coding HA
      servers: 4
      # 2 volumes par serveur (drives)
      volumesPerServer: 2
      # Taille de chaque PVC
      volumeClaimTemplate:
        metadata:
          name: data
        spec:
          storageClassName: example-nfs
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi           # 2Gi × 2 drives × 4 serveurs = 16Gi brut

      # Ressources par pod MinIO
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi

      # Spread les pods sur différents nœuds si possible
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    v1.min.io/tenant: minio-tenant
                topologyKey: kubernetes.io/hostname

  # ── PodDisruptionBudget ────────────────────────────────────
  # Garantit que les rolling updates ne coupent pas le quorum
  podManagementPolicy: Parallel

  # ── Features ──────────────────────────────────────────────
  features:
    bucketDNS: false          # Désactivé — pas de DNS wildcard en lab
    domains: {}

  # ── Bucket initial ─────────────────────────────────────────
  # Créé automatiquement au bootstrap du Tenant
  buckets:
    - name: wp-uploads          # Bucket principal pour WordPress
      objectLock: false
      region: us-east-1         # Région par défaut (MinIO l'accepte même en local)

  # ── Users ─────────────────────────────────────────────────
  # Utilisateur WordPress créé automatiquement
  users:
    - name: minio-wp-credentials  # Référence le Secret minio-wp-credentials

  # ── Console MinIO ──────────────────────────────────────────
  mountPath: /export

  # ── Services ──────────────────────────────────────────────
  # L'opérateur crée automatiquement :
  #   minio-tenant-hl       (headless — communication interne entre pods)
  #   minio-tenant-console  (UI console)
  # On ajoute des NodePort séparés dans minio-nodeport-test.yaml

  # ── TLS ───────────────────────────────────────────────────
  # Désactivé pour simplifier le lab (HTTP en interne)
  # En production : requestAutoCert: true
  requestAutoCert: false

  # ── Env supplémentaires ───────────────────────────────────
  env:
    # Région S3 (doit correspondre à la config plugin WordPress)
    - name: MINIO_REGION
      value: "us-east-1"
    # Nom affiché dans la console
    - name: MINIO_SITE_NAME
      value: "wordpress-ha-storage"
    # Activer le versioning des objets (utile pour les médias WP)
    - name: MINIO_BROWSER
      value: "on"
