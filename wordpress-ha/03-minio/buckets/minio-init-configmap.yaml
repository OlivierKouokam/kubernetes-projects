# =============================================================
# ConfigMap — Politique bucket wp-uploads
#
# Politique S3 accordée à l'utilisateur WordPress :
#   - Lecture/écriture sur le bucket wp-uploads uniquement
#   - Pas d'accès aux autres buckets ni aux opérations admin
#
# Principes of least privilege : WordPress peut uploader,
# lire et supprimer ses propres médias, rien de plus.
# =============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-wp-policy
  namespace: wordpress-ha
  labels:
    app.kubernetes.io/part-of: wordpress-ha-stack
    app.kubernetes.io/component: minio
data:
  wp-uploads-policy.json: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Action": [
            "s3:GetBucketLocation",
            "s3:ListBucket",
            "s3:ListBucketMultipartUploads"
          ],
          "Resource": ["arn:aws:s3:::wp-uploads"]
        },
        {
          "Effect": "Allow",
          "Action": [
            "s3:PutObject",
            "s3:GetObject",
            "s3:DeleteObject",
            "s3:ListMultipartUploadParts",
            "s3:AbortMultipartUpload"
          ],
          "Resource": ["arn:aws:s3:::wp-uploads/*"]
        }
      ]
    }

  # Script de configuration post-démarrage du Tenant
  # Exécuté par le Job minio-init-job
  init-minio.sh: |
    #!/bin/sh
    set -e

    MINIO_ENDPOINT="http://minio-tenant-hl.wordpress-ha.svc.cluster.local:9000"
    ROOT_USER="${MINIO_ROOT_USER}"
    ROOT_PASS="${MINIO_ROOT_PASSWORD}"
    WP_ACCESS="${WP_ACCESS_KEY}"
    WP_SECRET="${WP_SECRET_KEY}"

    echo "Configuration de l'alias mc..."
    mc alias set myminio "${MINIO_ENDPOINT}" "${ROOT_USER}" "${ROOT_PASS}" \
      --api S3v4

    echo "Vérification/création du bucket wp-uploads..."
    mc mb --ignore-existing myminio/wp-uploads

    echo "Configuration de la politique publique de lecture (médias publics WP)..."
    # Les médias WordPress doivent être lisibles publiquement (images dans les posts)
    mc anonymous set download myminio/wp-uploads

    echo "Création de la politique IAM wp-uploads-policy..."
    mc admin policy create myminio wp-uploads-policy \
      /config/wp-uploads-policy.json

    echo "Création de l'utilisateur WordPress..."
    mc admin user add myminio "${WP_ACCESS}" "${WP_SECRET}"

    echo "Association de la politique à l'utilisateur WordPress..."
    mc admin policy attach myminio wp-uploads-policy \
      --user "${WP_ACCESS}"

    echo "Vérification..."
    mc admin user info myminio "${WP_ACCESS}"
    mc ls myminio/wp-uploads

    echo "✓ MinIO configuré avec succès pour WordPress !"
