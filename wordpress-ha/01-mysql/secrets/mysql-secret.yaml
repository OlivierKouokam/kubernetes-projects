# =============================================================
# Secrets MySQL
# ⚠️  Valeurs en base64 — NE PAS committer en clair en production
#     Utiliser Sealed Secrets ou External Secrets Operator plus tard
#
# Pour générer vos propres valeurs :
#   echo -n 'votre_mot_de_passe' | base64
#
# Valeurs par défaut ici (à CHANGER avant tout usage réel) :
#   rootPassword : WPr00tS3cur3!2024
#   wpPassword   : WPdbP@ss2024!
# =============================================================

apiVersion: v1
kind: Secret
metadata:
  name: mysql-credentials
  namespace: wordpress-ha
  labels:
    app.kubernetes.io/part-of: wordpress-ha-stack
    app.kubernetes.io/component: mysql
type: Opaque
data:
  # echo -n 'WPr00tS3cur3!2024' | base64
  rootPassword: V1ByMDB0UzNjdXIzITIwMjQ=
  # echo -n 'WPdbP@ss2024!' | base64
  wpPassword: V1BkYlBAc3MyMDI0IQ==
  # echo -n 'wordpress' | base64
  wpUser: d29yZHByZXNz
  # echo -n 'wordpress_db' | base64
  wpDatabase: d29yZHByZXNzX2Ri
