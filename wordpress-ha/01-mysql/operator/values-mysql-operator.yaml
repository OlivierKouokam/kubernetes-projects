# =============================================================
# MySQL Operator for Kubernetes — Oracle
# Helm chart : mysql-operator
# Repo       : https://mysql.github.io/mysql-operator/
# Version    : 9.x (MySQL 9.x InnoDB Cluster)
# =============================================================

# L'opérateur tourne dans son propre namespace (mysql-operator)
# Il surveille TOUTES les namespaces par défaut.

image:
  pullPolicy: IfNotPresent

envs:
  # Niveau de log opérateur (INFO | DEBUG)
  logLevel: INFO

# Pas de ressources particulières nécessaires pour l'opérateur seul
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# RBAC — l'opérateur a besoin de droits cluster-wide pour
# créer/surveiller les CRDs InnoDBCluster dans toutes les namespaces
rbac:
  create: true

serviceAccount:
  create: true

# Pas de webhooks optionnels nécessaires pour notre usage
envs:
  debugLevel: 0
