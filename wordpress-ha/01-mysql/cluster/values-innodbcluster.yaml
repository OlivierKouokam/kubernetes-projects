# =============================================================
# InnoDB Cluster — MySQL Operator for Kubernetes
# Helm chart : mysql-innodbcluster
# Repo       : https://mysql.github.io/mysql-operator/
#
# Topologie cible :
#   - 3 instances MySQL (1 primary R/W + 2 secondary R/O)
#   - MySQLRouter intégré (2 replicas) pour le routing automatique
#   - Group Replication activée
#   - Auto-failover natif via MySQL Operator
#   - Storage : example-nfs (dynamic provisioning)
#   - NodePort exposé pour tests directs
# =============================================================

# ── Credentials ─────────────────────────────────────────────
# Référence le Secret créé dans secrets/mysql-secret.yaml
credentials:
  root:
    user: root
    password: ""          # Ignoré — géré par le Secret existant
    host: "%"

# Le Secret doit exister AVANT le helm install
# Nom du secret Kubernetes contenant rootPassword
existingSecret: mysql-credentials

# ── Image MySQL ──────────────────────────────────────────────
image:
  pullPolicy: IfNotPresent

# Version MySQL (doit correspondre à ce que supporte l'opérateur installé)
version: "9.1.0"

# ── Topologie du cluster ─────────────────────────────────────
serverInstances: 3          # 1 primary + 2 secondary (minimum HA)
routerInstances: 2          # MySQLRouter en HA aussi

# ── Initialisation de la base WordPress ─────────────────────
# Crée la base et l'utilisateur au premier démarrage
initDB:
  dump: {}
  # Script SQL exécuté après l'initialisation
  # Utilise les valeurs du Secret via les variables d'environnement
  # NB: l'opérateur ne supporte pas directement initDB via SQL inline,
  #     on utilise un ConfigMap séparé (voir mysql-initdb-configmap.yaml)

# ── Stockage ─────────────────────────────────────────────────
datadirVolumeClaimTemplate:
  storageClassName: example-nfs   # StorageClass NFS présente dans le cluster
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi                # 5Gi par instance MySQL (×3 = 15Gi total)

# ── Ressources compute ───────────────────────────────────────
podSpec:
  containers:
    - name: mysql
      resources:
        requests:
          cpu: 500m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi

# ── MySQLRouter ──────────────────────────────────────────────
router:
  podSpec:
    containers:
      - name: router
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

# ── Services & exposition ─────────────────────────────────────
# Service principal (MySQLRouter) — exposition en NodePort pour tests
service:
  type: NodePort
  port: 3306
  # nodePort: 30306   # Décommenter pour fixer le port NodePort

# Service R/O secondaire pour les lectures optionnelles
serviceReadOnly:
  type: ClusterIP   # Lecture seule — accès interne uniquement

# ── TLS ──────────────────────────────────────────────────────
tls:
  useSelfSigned: true   # TLS auto-signé pour la communication interne
                        # Suffisant pour lab/vidéo — remplacer en prod

# ── Backup (désactivé en phase 1) ────────────────────────────
backupProfiles: []
backupSchedules: []

# ── Logs ─────────────────────────────────────────────────────
logs:
  error:
    collect: true
  general:
    collect: false      # Trop verbeux pour un lab
  slowQuery:
    collect: true
    longQueryTime: 2    # Requêtes > 2s loggées

# ── Affinité & Tolérances ────────────────────────────────────
# Spread les pods MySQL sur des nœuds différents si possible
podAntiAffinity: preferred    # "required" en production réelle

# ── Readiness / Liveness probes ──────────────────────────────
# Gérées nativement par l'opérateur — pas besoin de les redéfinir
