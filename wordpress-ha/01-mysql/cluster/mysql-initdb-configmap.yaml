# =============================================================
# ConfigMap — Script d'initialisation de la base WordPress
# Monté comme volume dans un Job d'init post-cluster
#
# Ce Job attend que le cluster MySQL soit ONLINE avant d'exécuter
# la création de la base et de l'utilisateur WordPress.
# =============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-initdb-scripts
  namespace: wordpress-ha
  labels:
    app.kubernetes.io/part-of: wordpress-ha-stack
    app.kubernetes.io/component: mysql
data:
  init-wordpress-db.sql: |
    -- Création de la base WordPress
    CREATE DATABASE IF NOT EXISTS wordpress_db
      CHARACTER SET utf8mb4
      COLLATE utf8mb4_unicode_ci;

    -- Création de l'utilisateur WordPress
    -- Le mot de passe est injecté via variable d'environnement dans le Job
    CREATE USER IF NOT EXISTS 'wordpress'@'%' IDENTIFIED BY '${WP_DB_PASSWORD}';

    -- Droits complets sur la base WordPress uniquement
    GRANT ALL PRIVILEGES ON wordpress_db.* TO 'wordpress'@'%';

    -- Flush pour prise en compte immédiate
    FLUSH PRIVILEGES;

    -- Vérification
    SELECT User, Host FROM mysql.user WHERE User = 'wordpress';
    SHOW GRANTS FOR 'wordpress'@'%';
