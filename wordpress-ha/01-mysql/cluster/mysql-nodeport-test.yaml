# =============================================================
# Service NodePort — Accès externe au MySQLRouter pour tests
#
# ⚠️  USAGE TEST UNIQUEMENT — ne pas exposer en production
#
# Ce service permet de se connecter depuis l'extérieur du cluster
# avec un client MySQL (DBeaver, mysql CLI, TablePlus...) pour
# vérifier le bon fonctionnement du cluster InnoDB.
#
# Connection string test :
#   mysql -h <NODE_IP> -P 30306 -u wordpress -p wordpress_db
#   mysql -h <NODE_IP> -P 30306 -u root -p
#
# Vérification du cluster :
#   SELECT * FROM performance_schema.replication_group_members;
# =============================================================

apiVersion: v1
kind: Service
metadata:
  name: mysql-nodeport-test
  namespace: wordpress-ha
  labels:
    app.kubernetes.io/part-of: wordpress-ha-stack
    app.kubernetes.io/component: mysql-test
  annotations:
    description: "NodePort de test — supprimer après validation"
spec:
  type: NodePort
  selector:
    # Cible le MySQLRouter (créé automatiquement par l'opérateur)
    # Le label exact dépend du nom du cluster (mycluster)
    component: mysqlrouter
    mysql.oracle.com/cluster: mycluster
  ports:
    - name: mysql
      protocol: TCP
      port: 3306
      targetPort: 6446       # Port R/W du MySQLRouter
      nodePort: 30306        # Port fixe sur tous les nœuds du cluster
    - name: mysql-ro
      protocol: TCP
      port: 3307
      targetPort: 6447       # Port R/O du MySQLRouter
      nodePort: 30307        # Lectures seules — pour tests de réplication
