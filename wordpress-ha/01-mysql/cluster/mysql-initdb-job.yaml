# =============================================================
# Job — Initialisation de la base WordPress
#
# Ce Job doit être lancé APRÈS que le cluster InnoDB soit ONLINE.
# Il se connecte via MySQLRouter (ClusterIP interne) et exécute
# le script SQL d'init.
#
# Pré-requis : le cluster InnoDB doit être en état ONLINE
#   kubectl get innodbcluster -n wordpress-ha
#
# Usage :
#   kubectl apply -f mysql-initdb-job.yaml -n wordpress-ha
#   kubectl logs -n wordpress-ha job/mysql-initdb -f
# =============================================================

apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-initdb
  namespace: wordpress-ha
  labels:
    app.kubernetes.io/part-of: wordpress-ha-stack
    app.kubernetes.io/component: mysql-init
spec:
  ttlSecondsAfterFinished: 300    # Nettoyage automatique du Job après 5 min
  backoffLimit: 5                 # 5 tentatives max (cluster peut mettre du temps)
  template:
    metadata:
      labels:
        app: mysql-initdb
    spec:
      restartPolicy: OnFailure

      # Init container : attendre que MySQLRouter soit prêt
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Attente de MySQLRouter sur mycluster-router-service:3306..."
              until nc -z mycluster-router-service 3306; do
                echo "MySQL pas encore disponible — attente 5s..."
                sleep 5
              done
              echo "MySQL disponible !"
              # Attente supplémentaire pour que le cluster soit ONLINE
              sleep 10

      containers:
        - name: mysql-init
          image: mysql:9.1
          command:
            - sh
            - -c
            - |
              echo "Connexion à MySQL via MySQLRouter..."
              # Substitution du mot de passe dans le script SQL
              export INIT_SQL=$(cat /scripts/init-wordpress-db.sql | \
                sed "s/\${WP_DB_PASSWORD}/${WP_DB_PASSWORD}/g")

              echo "$INIT_SQL" | mysql \
                -h mycluster-router-service \
                -P 3306 \
                -u root \
                -p${MYSQL_ROOT_PASSWORD} \
                --protocol=TCP \
                --ssl-mode=PREFERRED

              if [ $? -eq 0 ]; then
                echo "✓ Base WordPress initialisée avec succès"
              else
                echo "✗ Erreur lors de l'initialisation"
                exit 1
              fi

          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: rootPassword
            - name: WP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: wpPassword

          volumeMounts:
            - name: init-scripts
              mountPath: /scripts

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

      volumes:
        - name: init-scripts
          configMap:
            name: mysql-initdb-scripts
