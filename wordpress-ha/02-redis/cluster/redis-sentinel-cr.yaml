# =============================================================
# RedisSentinel — Custom Resource OT-SCNG
#
# Topologie déployée :
#   - 3 pods Redis  : 1 master R/W + 2 replicas R/O
#   - 3 pods Sentinel: quorum=2 (majority), détection de panne
#                      et promotion automatique du nouveau master
#
# Fonctionnement du failover :
#   1. Un Sentinel détecte que le master ne répond plus
#   2. Les 3 Sentinels votent (quorum=2 → 2 voix suffisent)
#   3. Un replica est élu nouveau master automatiquement
#   4. WordPress se reconnecte via le nom logique du master
#      (grâce au plugin Redis Object Cache qui supporte Sentinel)
#
# Nom logique du master (à configurer dans WordPress) :
#   mymaster
#
# Endpoint Sentinel pour WordPress :
#   redis-sentinel-service:26379  (port Sentinel standard)
# =============================================================

apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisSentinel
metadata:
  name: redis-sentinel
  namespace: wordpress-ha
  labels:
    app.kubernetes.io/part-of: wordpress-ha-stack
    app.kubernetes.io/component: redis
spec:

  # ── Taille du cluster ──────────────────────────────────────
  # 3 pods Redis (master + 2 replicas)
  clusterSize: 3

  # ── Image Redis ────────────────────────────────────────────
  redisSentinelConfig:
    masterGroupName: mymaster       # Nom logique du master (utilisé par WordPress)
    redisPort: "6379"
    sentinelPort: "26379"
    quorum: "2"                     # Majorité : 2 Sentinels sur 3 pour voter
    parallelSyncs: "1"              # 1 replica resync à la fois (évite la surcharge)
    failoverTimeout: "10000"        # 10s avant de déclarer un failover
    downAfterMilliseconds: "5000"   # 5s sans réponse → master considéré down

  # ── Authentification ───────────────────────────────────────
  redisSentinelConfig:
    masterGroupName: mymaster
    redisPort: "6379"
    sentinelPort: "26379"
    quorum: "2"
    parallelSyncs: "1"
    failoverTimeout: "10000"
    downAfterMilliseconds: "5000"

  # Auth partagée master + replicas + sentinels
  redisSecret:
    name: redis-credentials
    key: password

  # ── Image Redis ────────────────────────────────────────────
  kubernetesConfig:
    image: redis:7.2-alpine          # Redis 7.2 LTS — stable et léger
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  # ── Image Sentinel ─────────────────────────────────────────
  redisSentinelConfig:
    masterGroupName: mymaster
    redisPort: "6379"
    sentinelPort: "26379"
    quorum: "2"
    parallelSyncs: "1"
    failoverTimeout: "10000"
    downAfterMilliseconds: "5000"

  # ── Stockage ───────────────────────────────────────────────
  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: example-nfs    # StorageClass NFS présente dans le cluster
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi               # 1Gi par pod Redis (×3 = 3Gi total)
                                       # Cache Redis — pas besoin de beaucoup

  # ── Redémarrage automatique si le Secret change ───────────────
  redisSecret:
    name: redis-credentials
    key: password

  # ── Anti-affinité ─────────────────────────────────────────
  # Spread les pods sur différents nœuds si possible
  podDisruptionBudget:
    enabled: true
    minAvailable: 2                    # Minimum 2 pods Redis disponibles

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app: redis-sentinel
            topologyKey: kubernetes.io/hostname

  # ── Liveliness / Readiness (gérés par l'opérateur) ────────
  # L'opérateur OT-SCNG injecte automatiquement les probes Redis

  # ── Variables d'environnement Redis ───────────────────────
  redisExporter:
    enabled: false    # Désactivé en phase 1 — activer avec Prometheus en phase E
