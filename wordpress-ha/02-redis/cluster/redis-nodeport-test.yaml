# =============================================================
# Services NodePort — Accès externe Redis + Sentinel pour tests
#
# ⚠️  USAGE TEST UNIQUEMENT
#
# Ports exposés :
#   30379 → Redis master  (6379) — connexion directe
#   30380 → Sentinel      (26379) — découverte du master
#
# Tests depuis l'extérieur :
#
#   # Ping Redis master
#   redis-cli -h <NODE_IP> -p 30379 -a 'RedisSent!n3l2024' ping
#
#   # Info réplication
#   redis-cli -h <NODE_IP> -p 30379 -a 'RedisSent!n3l2024' INFO replication
#
#   # Interroger Sentinel — qui est le master actuel ?
#   redis-cli -h <NODE_IP> -p 30380 SENTINEL masters
#   redis-cli -h <NODE_IP> -p 30380 SENTINEL get-master-addr-by-name mymaster
#
#   # Lister les replicas
#   redis-cli -h <NODE_IP> -p 30380 SENTINEL replicas mymaster
# =============================================================

---
# Service NodePort vers le Redis master
apiVersion: v1
kind: Service
metadata:
  name: redis-master-nodeport-test
  namespace: wordpress-ha
  labels:
    app.kubernetes.io/part-of: wordpress-ha-stack
    app.kubernetes.io/component: redis-test
  annotations:
    description: "NodePort test Redis master — supprimer après validation"
spec:
  type: NodePort
  selector:
    app: redis-sentinel
    redis-role: master          # Label posé par l'opérateur OT-SCNG sur le master
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: 6379
      nodePort: 30379

---
# Service NodePort vers les Sentinels
apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel-nodeport-test
  namespace: wordpress-ha
  labels:
    app.kubernetes.io/part-of: wordpress-ha-stack
    app.kubernetes.io/component: redis-test
  annotations:
    description: "NodePort test Sentinel — supprimer après validation"
spec:
  type: NodePort
  selector:
    app: redis-sentinel
    redis-role: sentinel        # Label posé par l'opérateur sur les Sentinels
  ports:
    - name: sentinel
      protocol: TCP
      port: 26379
      targetPort: 26379
      nodePort: 30380
