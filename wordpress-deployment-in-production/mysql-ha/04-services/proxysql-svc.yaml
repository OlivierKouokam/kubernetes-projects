# =============================================================================
# COUCHE 4 — SERVICES : ClusterIP ProxySQL (point d'entrée unique)
# =============================================================================
# Ce Service est le SEUL point d'accès pour les applications.
# WordPress et PhpMyAdmin se connectent ici, jamais directement à MySQL.
#
# Flux :
#   WordPress (port 3306)
#     └─► proxysql-svc:3306  (ClusterIP)
#           └─► ProxySQL pod:6033
#                 ├─► mysql-0:3306  (PRIMARY — INSERTs/UPDATEs)
#                 ├─► mysql-1:3306  (SECONDARY — SELECTs)
#                 └─► mysql-2:3306  (SECONDARY — SELECTs)
#
# Pourquoi remapper 3306 → 6033 ?
#   Les apps utilisent le port MySQL standard (3306).
#   ProxySQL écoute sur 6033 par convention interne.
#   Le Service fait le remapping : apps voient 3306, ProxySQL reçoit sur 6033.
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: proxysql-svc
  namespace: wordpress
  labels:
    app.kubernetes.io/part-of: wordpress-stack
    app: proxysql
    role: sql-entrypoint
spec:
  type: ClusterIP
  selector:
    app: proxysql
  ports:
    # Port MySQL standard — les applications se connectent ici
    - name: mysql
      port: 3306
      targetPort: 6033   # ProxySQL écoute sur 6033

    # Port admin ProxySQL — pour le monitoring interne ou debug
    # NE PAS exposer via Ingress en production
    - name: admin
      port: 6032
      targetPort: 6032

---
# =============================================================================
# COUCHE 4 — SERVICES : ClusterIP MySQL direct (debug uniquement)
# =============================================================================
# Ce service expose directement mysql-0 (le primary bootstrap) pour le debug.
# NE PAS utiliser pour les applications — utiliser proxysql-svc.
# Peut être supprimé en production.
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: mysql-primary
  namespace: wordpress
  labels:
    app.kubernetes.io/part-of: wordpress-stack
    app: mysql
    role: debug
  annotations:
    description: "Debug uniquement — utiliser proxysql-svc pour les apps"
spec:
  type: ClusterIP
  # Sélectionner seulement mysql-0 via son nom de pod stable
  # (en pratique, le selector ne peut pas filtrer par nom de pod dans un StatefulSet
  #  → utiliser le Headless Service pour accéder à mysql-0 directement)
  selector:
    app: mysql
    statefulset.kubernetes.io/pod-name: mysql-0
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
