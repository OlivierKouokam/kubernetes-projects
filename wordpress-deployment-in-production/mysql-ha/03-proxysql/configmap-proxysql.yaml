# =============================================================================
# COUCHE 3 — PROXYSQL : ConfigMap proxysql.cnf
# =============================================================================
# ProxySQL est le proxy SQL intelligent qui sépare les écritures et les lectures.
#
# Flux du trafic :
#
#  App (WordPress/PhpMyAdmin)
#    └─► proxysql-svc:3306    (ClusterIP K8s)
#          └─► ProxySQL:6033  (port SQL)
#                ├─► Hostgroup 10 : PRIMARY  MySQL → INSERT / UPDATE / DELETE
#                └─► Hostgroup 20 : SECONDARIES MySQL → SELECT (load balanced)
#
# Cette config est le point de départ statique.
# Le sidecar configurator.py la met à jour dynamiquement via l'API admin (6032)
# à chaque changement de topologie MGR (failover, scale up/down).
#
# Query Rules (règles de routage) :
#   Rule 1 : SELECT ... FOR UPDATE → writer (verrou transactionnel)
#   Rule 2 : SELECT               → readers (load balanced)
#   Default : tout le reste       → writer  (INSERT, UPDATE, DELETE, DDL)
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: proxysql-config
  namespace: wordpress
  labels:
    app.kubernetes.io/part-of: wordpress-stack
    app: proxysql
data:
  proxysql.cnf: |
    # Répertoire de données ProxySQL (stats, cache config sur disque)
    datadir="/var/lib/proxysql"

    # ===========================================================
    # ADMIN — interface d'administration ProxySQL
    # Port 6032 : accessible uniquement depuis le cluster (ClusterIP)
    # admin_credentials : user:password pour se connecter à l'admin
    # ===========================================================
    admin_variables=
    {
        # ⚠️  CHANGER en production (correspondre au Secret proxysql-admin-password)
        admin_credentials="admin:proxyadmin123"
        # Écouter sur toutes les interfaces pour que le sidecar puisse y accéder
        mysql_ifaces="0.0.0.0:6032"
        refresh_interval=2000
        # Activer les statistiques avancées
        stats_credentials="stats:stats123"
    }

    # ===========================================================
    # MYSQL VARIABLES — comportement général du proxy
    # ===========================================================
    mysql_variables=
    {
        # Nombre de threads de traitement des connexions entrantes
        threads=4

        # Nombre max de connexions simultanées côté clients (apps)
        max_connections=2048

        # Délai artificiel (ms) avant d'envoyer une requête au backend
        default_query_delay=0

        # Timeout général d'une requête (ms) — 10h pour les longues opérations
        default_query_timeout=36000000

        # Compression des données entre ProxySQL et MySQL
        have_compress=true

        # Interface d'écoute SQL (apps → ProxySQL)
        interfaces="0.0.0.0:6033"

        # Schema par défaut si l'app ne le spécifie pas
        default_schema="information_schema"

        # Version MySQL annoncée aux clients (doit correspondre au backend)
        server_version="8.0.30"

        # Timeout de connexion vers un backend MySQL (ms)
        connect_timeout_server=3000

        # -------------------------------------------------------
        # Monitoring MySQL (health-check des backends)
        # ProxySQL se connecte avec ces credentials pour vérifier
        # que chaque backend MySQL est vivant et répond.
        # Doit correspondre au user 'proxysql' créé dans bootstrap.sh
        # -------------------------------------------------------
        monitor_username="proxysql"
        monitor_password="proxyadmin"          # ⚠️  correspondre au Secret

        # Historique des événements de monitoring (ms)
        monitor_history=600000

        # Fréquence des connexions test vers les backends (ms)
        monitor_connect_interval=60000
        monitor_ping_interval=10000
        ping_interval_server_msec=10000
        ping_timeout_server=200

        # Statistiques par commande SQL
        commands_stats=true

        # Trier les sessions par durée (aide au debugging)
        sessions_sort=true

        # Tentatives de reconnexion sur échec de connexion backend
        connect_retries_on_failure=10

        # Maintenir les sessions en cas de transaction active
        # CRITICAL pour la cohérence transactionnelle
        default_charset="utf8mb4"
    }

    # ===========================================================
    # MYSQL SERVERS — backends MySQL
    # Configuration initiale statique (sera mise à jour par configurator.py)
    #
    # Hostgroups :
    #   10 = WRITER  : toujours le PRIMARY MGR (1 seul)
    #   20 = READERS : tous les SECONDARY MGR (N réplicas)
    # ===========================================================
    mysql_servers=
    (
        {
            address="mysql-0.mysql-headless.wordpress.svc.cluster.local"
            port=3306
            hostgroup=10
            status="ONLINE"
            weight=1000
            max_connections=100
            comment="mysql-0 - bootstrap writer"
        },
        {
            address="mysql-1.mysql-headless.wordpress.svc.cluster.local"
            port=3306
            hostgroup=20
            status="ONLINE"
            weight=100
            max_connections=200
            comment="mysql-1 - bootstrap reader"
        },
        {
            address="mysql-2.mysql-headless.wordpress.svc.cluster.local"
            port=3306
            hostgroup=20
            status="ONLINE"
            weight=100
            max_connections=200
            comment="mysql-2 - bootstrap reader"
        }
    )

    # ===========================================================
    # MYSQL USERS — credentials que les apps utilisent pour se connecter
    # ProxySQL les intercepte et les reroute vers le bon hostgroup.
    #
    # default_hostgroup : hostgroup par défaut si aucune query rule ne s'applique
    # transaction_persistent : CRITICAL — maintient la même connexion backend
    #   pendant toute la durée d'une transaction (cohérence ACID)
    # ===========================================================
    mysql_users=
    (
        {
            username="wordpress"
            password="wppassword"          # ⚠️  correspondre au Secret
            default_hostgroup=10           # par défaut → writer
            active=1
            transaction_persistent=1
            comment="User WordPress"
        },
        {
            username="phpmyadmin"
            password="wppassword"          # ⚠️  correspondre au Secret
            default_hostgroup=10
            active=1
            transaction_persistent=1
            comment="User PhpMyAdmin"
        }
    )

    # ===========================================================
    # MYSQL QUERY RULES — routage READ/WRITE
    #
    # Les règles sont évaluées dans l'ordre (rule_id croissant).
    # "apply=1" signifie qu'on arrête l'évaluation une fois la règle matchée.
    #
    # Règle 1 : SELECT ... FOR UPDATE → writer
    #   (verrouillage pessimiste, doit aller sur le primary)
    # Règle 2 : SELECT → readers (load balancé sur hostgroup 20)
    # Défaut  : tout le reste → writer (hostgroup 10 = default_hostgroup)
    # ===========================================================
    mysql_query_rules=
    (
        {
            rule_id=1
            active=1
            match_pattern="^SELECT .* FOR (UPDATE|SHARE)"
            destination_hostgroup=10
            apply=1
            comment="SELECT FOR UPDATE/SHARE → writer (verrouillage)"
        },
        {
            rule_id=2
            active=1
            match_pattern="^SELECT"
            destination_hostgroup=20
            apply=1
            comment="SELECT → readers (load balanced)"
        }
    )
