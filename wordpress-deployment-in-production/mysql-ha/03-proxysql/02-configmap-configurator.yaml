# =============================================================================
# COUCHE 3 — PROXYSQL : ConfigMap Script Configurateur Python
# =============================================================================
# Ce script tourne en boucle infinie dans le sidecar du pod ProxySQL.
#
# Responsabilités :
#   1. Interroger la topologie MGR toutes les SYNC_INTERVAL secondes
#      (depuis n'importe quel pod MySQL disponible)
#   2. Comparer avec la config actuelle de ProxySQL (admin API port 6032)
#   3. Synchroniser : ajouter/retirer des backends, changer le writer
#   4. Sauvegarder la config en mémoire ET sur disque (LOAD + SAVE)
#
# Scénarios gérés automatiquement :
#   - Failover : mysql-0 tombe → mysql-1 élu PRIMARY → ProxySQL mis à jour
#   - Scale up  : mysql-3 rejoint MGR → ajouté au pool readers automatiquement
#   - Scale down : mysql-2 retiré → retiré du pool readers proprement
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: proxysql-configurator
  namespace: wordpress
  labels:
    app.kubernetes.io/part-of: wordpress-stack
    app: proxysql
data:
  configurator.py: |
    #!/usr/bin/env python3
    """
    ProxySQL Dynamic Configurator
    ==============================
    Surveille la topologie MySQL Group Replication et synchronise
    ProxySQL en temps réel via son interface d'administration (port 6032).

    Dépendances : mysql-client (installé dans l'entrypoint du container)
    """

    import time
    import os
    import subprocess
    import logging
    import sys

    # ---------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------
    logging.basicConfig(
        level=logging.INFO,
        format="%(asctime)s [%(levelname)s] %(message)s",
        handlers=[logging.StreamHandler(sys.stdout)]
    )
    log = logging.getLogger("proxysql-configurator")

    # ---------------------------------------------------------------
    # Configuration (depuis variables d'environnement)
    # ---------------------------------------------------------------
    NAMESPACE        = os.environ.get("NAMESPACE", "wordpress")
    HEADLESS_SVC     = os.environ.get("HEADLESS_SVC", "mysql-headless")
    REPLICAS         = int(os.environ.get("REPLICAS", "3"))
    MYSQL_USER       = os.environ.get("PROXYSQL_MYSQL_USER", "proxysql")
    MYSQL_PASS       = os.environ.get("PROXYSQL_MYSQL_PASS", "proxyadmin")
    PROXY_ADMIN_HOST = os.environ.get("PROXY_ADMIN_HOST", "127.0.0.1")
    PROXY_ADMIN_PORT = os.environ.get("PROXY_ADMIN_PORT", "6032")
    PROXY_ADMIN_USER = os.environ.get("PROXY_ADMIN_USER", "admin")
    PROXY_ADMIN_PASS = os.environ.get("PROXY_ADMIN_PASS", "proxyadmin123")
    INTERVAL         = int(os.environ.get("SYNC_INTERVAL", "15"))

    # Conventions des hostgroups ProxySQL
    HG_WRITER = 10    # 1 seul PRIMARY MGR
    HG_READER = 20    # tous les SECONDARY MGR


    # ===============================================================
    # Helpers : exécution de requêtes SQL
    # ===============================================================

    def run_mysql(host, query, port=3306, user=None, password=None, timeout=5):
        """
        Exécute une requête MySQL sur un hôte donné.
        Retourne stdout sous forme de string, ou None en cas d'erreur.
        """
        u = user or MYSQL_USER
        p = password or MYSQL_PASS
        cmd = [
            "mysql",
            f"-u{u}", f"-p{p}",
            f"-h{host}", f"-P{str(port)}",
            "--connect-timeout=3",
            "--protocol=TCP",
            "-sN",
            "-e", query
        ]
        try:
            result = subprocess.run(
                cmd,
                capture_output=True,
                text=True,
                timeout=timeout
            )
            if result.returncode == 0:
                return result.stdout.strip()
            else:
                log.debug(f"Erreur MySQL sur {host}: {result.stderr.strip()}")
                return None
        except subprocess.TimeoutExpired:
            log.debug(f"Timeout MySQL sur {host}")
            return None
        except Exception as e:
            log.debug(f"Exception MySQL sur {host}: {e}")
            return None


    def run_proxy_admin(query, timeout=5):
        """
        Exécute une requête sur l'interface admin de ProxySQL (port 6032).
        Retourne stdout ou None en cas d'erreur.
        """
        return run_mysql(
            host=PROXY_ADMIN_HOST,
            port=int(PROXY_ADMIN_PORT),
            query=query,
            user=PROXY_ADMIN_USER,
            password=PROXY_ADMIN_PASS,
            timeout=timeout
        )


    # ===============================================================
    # Récupération de la topologie MGR
    # ===============================================================

    def get_mgr_topology():
        """
        Interroge la vue performance_schema.replication_group_members
        depuis n'importe quel pod MySQL disponible.

        Retourne un dict :
          { "mysql-0.mysql-headless...": "PRIMARY",
            "mysql-1.mysql-headless...": "SECONDARY",
            "mysql-2.mysql-headless...": "SECONDARY" }
        """
        query = """
            SELECT MEMBER_HOST, MEMBER_ROLE
            FROM performance_schema.replication_group_members
            WHERE MEMBER_STATE = 'ONLINE';
        """
        # Essayer chaque pod dans l'ordre, s'arrêter au premier qui répond
        for i in range(REPLICAS):
            host = f"mysql-{i}.{HEADLESS_SVC}.{NAMESPACE}.svc.cluster.local"
            result = run_mysql(host, query)
            if result:
                topology = {}
                for line in result.split("\n"):
                    parts = line.strip().split("\t")
                    if len(parts) == 2:
                        member_host, role = parts[0].strip(), parts[1].strip()
                        topology[member_host] = role
                if topology:
                    log.info(f"Topologie MGR (via mysql-{i}): {topology}")
                    return topology
                else:
                    log.debug(f"Réponse vide de mysql-{i}")
            else:
                log.debug(f"mysql-{i} non disponible")

        log.warning("Aucun pod MySQL disponible pour récupérer la topologie MGR")
        return {}


    # ===============================================================
    # Lecture de la config actuelle de ProxySQL
    # ===============================================================

    def get_proxysql_current_servers():
        """
        Lit la table runtime_mysql_servers de ProxySQL.
        Retourne un dict :
          { 10: {"host1", "host2"}, 20: {"host3", "host4"} }
        """
        result = run_proxy_admin(
            "SELECT hostgroup_id, hostname FROM runtime_mysql_servers;"
        )
        servers = {}
        if result:
            for line in result.split("\n"):
                parts = line.strip().split("\t")
                if len(parts) == 2:
                    try:
                        hg = int(parts[0].strip())
                        host = parts[1].strip()
                        servers.setdefault(hg, set()).add(host)
                    except ValueError:
                        pass
        return servers


    # ===============================================================
    # Synchronisation ProxySQL ↔ MGR
    # ===============================================================

    def sync_proxysql(topology):
        """
        Compare la topologie MGR souhaitée avec la config actuelle
        de ProxySQL et applique les différences.

        Actions possibles :
          - Ajouter un nouveau writer (failover ou premier démarrage)
          - Retirer l'ancien writer (il est devenu SECONDARY)
          - Ajouter un nouveau reader (scale up)
          - Retirer un reader disparu (scale down ou crash)
        """
        if not topology:
            log.warning("Topologie vide — sync ignorée pour ce cycle")
            return

        # --- Calculer les états souhaités ---
        desired_writers = {h for h, r in topology.items() if r == "PRIMARY"}
        desired_readers = {h for h, r in topology.items() if r == "SECONDARY"}

        log.info(f"Souhaité   — Writers: {desired_writers} | Readers: {desired_readers}")

        # --- Lire l'état actuel de ProxySQL ---
        current = get_proxysql_current_servers()
        current_writers = current.get(HG_WRITER, set())
        current_readers = current.get(HG_READER, set())

        log.info(f"ProxySQL   — Writers: {current_writers} | Readers: {current_readers}")

        queries = []

        # --- Retirer les anciens writers qui ne sont plus PRIMARY ---
        for host in current_writers - desired_writers:
            queries.append(
                f"DELETE FROM mysql_servers "
                f"WHERE hostgroup_id={HG_WRITER} AND hostname='{host}';"
            )
            log.info(f"[-] Retrait writer: {host}")

        # --- Retirer les anciens readers disparus de MGR ---
        for host in current_readers - desired_readers:
            queries.append(
                f"DELETE FROM mysql_servers "
                f"WHERE hostgroup_id={HG_READER} AND hostname='{host}';"
            )
            log.info(f"[-] Retrait reader: {host}")

        # --- Ajouter les nouveaux writers ---
        for host in desired_writers - current_writers:
            queries.append(f"""
                INSERT INTO mysql_servers
                  (hostgroup_id, hostname, port, weight, max_connections, comment)
                VALUES
                  ({HG_WRITER}, '{host}', 3306, 1000, 100,
                   'PRIMARY - auto failover');
            """)
            log.info(f"[+] Ajout writer: {host}")

        # --- Ajouter les nouveaux readers (scale up ou failover) ---
        for host in desired_readers - current_readers:
            queries.append(f"""
                INSERT INTO mysql_servers
                  (hostgroup_id, hostname, port, weight, max_connections, comment)
                VALUES
                  ({HG_READER}, '{host}', 3306, 100, 200,
                   'SECONDARY - auto discovery');
            """)
            log.info(f"[+] Ajout reader: {host}")

        # --- Appliquer les changements si nécessaire ---
        if queries:
            log.info(f"Application de {len(queries)} changement(s) dans ProxySQL...")
            for q in queries:
                result = run_proxy_admin(q.strip())
                if result is None:
                    log.error(f"Échec de la requête ProxySQL admin: {q.strip()[:80]}")

            # Charger en mémoire (RUNTIME) et persister sur disque
            run_proxy_admin("LOAD MYSQL SERVERS TO RUNTIME;")
            run_proxy_admin("SAVE MYSQL SERVERS TO DISK;")
            log.info("ProxySQL synchronisé et config sauvegardée sur disque.")
        else:
            log.info("ProxySQL déjà synchronisé — aucun changement nécessaire.")


    # ===============================================================
    # Boucle principale
    # ===============================================================

    def wait_for_proxysql(max_attempts=30):
        """Attendre que ProxySQL soit prêt avant de commencer."""
        log.info("Attente de ProxySQL admin (port 6032)...")
        for attempt in range(max_attempts):
            result = run_proxy_admin("SELECT 1;")
            if result:
                log.info("ProxySQL admin est prêt.")
                return True
            log.info(f"ProxySQL pas encore prêt (tentative {attempt+1}/{max_attempts})...")
            time.sleep(5)
        log.error("ProxySQL admin n'est pas devenu disponible — abandon.")
        return False


    def main():
        log.info("=" * 60)
        log.info("ProxySQL Dynamic Configurator — démarrage")
        log.info(f"Namespace   : {NAMESPACE}")
        log.info(f"HeadlessSvc : {HEADLESS_SVC}")
        log.info(f"Replicas    : {REPLICAS}")
        log.info(f"Interval    : {INTERVAL}s")
        log.info(f"HG_WRITER   : {HG_WRITER}")
        log.info(f"HG_READER   : {HG_READER}")
        log.info("=" * 60)

        if not wait_for_proxysql():
            sys.exit(1)

        consecutive_errors = 0
        max_consecutive_errors = 10

        while True:
            try:
                topology = get_mgr_topology()
                sync_proxysql(topology)
                consecutive_errors = 0
            except Exception as e:
                consecutive_errors += 1
                log.error(f"Erreur lors du cycle de sync ({consecutive_errors}/{max_consecutive_errors}): {e}")
                if consecutive_errors >= max_consecutive_errors:
                    log.critical("Trop d'erreurs consécutives — redémarrage du configurateur")
                    sys.exit(1)

            time.sleep(INTERVAL)


    if __name__ == "__main__":
        main()
