# =============================================================================
# COUCHE 5 — NETWORK POLICIES
# =============================================================================
# Les Network Policies définissent les flux réseau autorisés au niveau L3/L4.
# Tout trafic non explicitement autorisé est BLOQUÉ (deny-all implicite
# dès qu'une Network Policy sélectionne un pod).
#
# Matrice des flux autorisés :
#
#   SOURCE              DESTINATION         PORT    RAISON
#   ─────────────────── ─────────────────── ─────── ─────────────────────────
#   WordPress           proxysql-svc        3306    Accès DB applicatif
#   PhpMyAdmin          proxysql-svc        3306    Administration DB
#   ProxySQL            MySQL pods          3306    Routage SQL
#   MySQL pods          MySQL pods          33061   Communication MGR (Paxos)
#   MySQL pods          MySQL pods          3306    Clone Plugin inter-pods
#   Configurator        MySQL pods          3306    Lecture topologie MGR
#   (tous)              (tous)              AUTRES  BLOQUÉ
# =============================================================================

---
# =============================================================================
# POLICY 1 : MySQL — deny all + allow depuis ProxySQL et membres MGR
# =============================================================================
# Les pods MySQL n'acceptent des connexions SQL (3306) QUE depuis ProxySQL.
# Entre eux (MGR), ils communiquent sur 33061 et 3306 (Clone Plugin).
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mysql-ingress-policy
  namespace: wordpress
  labels:
    app.kubernetes.io/part-of: wordpress-stack
spec:
  # S'applique à tous les pods avec le label app=mysql
  podSelector:
    matchLabels:
      app: mysql
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # --- Règle 1 : Autoriser ProxySQL → MySQL sur port 3306 ---
    - from:
        - podSelector:
            matchLabels:
              app: proxysql
      ports:
        - protocol: TCP
          port: 3306

    # --- Règle 2 : Autoriser MySQL ↔ MySQL (MGR sur 33061 + Clone sur 3306) ---
    - from:
        - podSelector:
            matchLabels:
              app: mysql
      ports:
        - protocol: TCP
          port: 3306    # Clone Plugin et réplication binlog
        - protocol: TCP
          port: 33061   # Paxos XCOM (communication MGR inter-membres)

  egress:
    # --- Les pods MySQL peuvent se connecter entre eux (MGR + Clone) ---
    - to:
        - podSelector:
            matchLabels:
              app: mysql
      ports:
        - protocol: TCP
          port: 3306
        - protocol: TCP
          port: 33061

    # --- Les pods MySQL peuvent résoudre le DNS du cluster ---
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# =============================================================================
# POLICY 2 : ProxySQL — deny all + allow depuis WordPress et PhpMyAdmin
# =============================================================================
# ProxySQL n'accepte des connexions SQL (6033) QUE depuis WordPress et PhpMyAdmin.
# Le port admin (6032) n'est accessible que depuis le pod ProxySQL lui-même
# (le sidecar y accède via 127.0.0.1 = loopback, donc pas de NetworkPolicy nécessaire).
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: proxysql-ingress-policy
  namespace: wordpress
  labels:
    app.kubernetes.io/part-of: wordpress-stack
spec:
  podSelector:
    matchLabels:
      app: proxysql
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # --- Autoriser WordPress → ProxySQL (SQL) ---
    - from:
        - podSelector:
            matchLabels:
              app: wordpress
      ports:
        - protocol: TCP
          port: 6033

    # --- Autoriser PhpMyAdmin → ProxySQL (SQL + Admin pour certaines opérations) ---
    - from:
        - podSelector:
            matchLabels:
              app: phpmyadmin
      ports:
        - protocol: TCP
          port: 6033

  egress:
    # --- ProxySQL peut se connecter aux pods MySQL (routage des requêtes) ---
    - to:
        - podSelector:
            matchLabels:
              app: mysql
      ports:
        - protocol: TCP
          port: 3306

    # --- Résolution DNS ---
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# =============================================================================
# POLICY 3 : WordPress — peut se connecter à ProxySQL uniquement
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wordpress-egress-policy
  namespace: wordpress
  labels:
    app.kubernetes.io/part-of: wordpress-stack
spec:
  podSelector:
    matchLabels:
      app: wordpress
  policyTypes:
    - Egress

  egress:
    # --- WordPress → ProxySQL (DB) ---
    - to:
        - podSelector:
            matchLabels:
              app: proxysql
      ports:
        - protocol: TCP
          port: 3306    # port du Service proxysql-svc (remappé vers 6033)

    # --- WordPress → Internet (téléchargement plugins, mises à jour) ---
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# =============================================================================
# POLICY 4 : PhpMyAdmin — peut se connecter à ProxySQL uniquement
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: phpmyadmin-egress-policy
  namespace: wordpress
  labels:
    app.kubernetes.io/part-of: wordpress-stack
spec:
  podSelector:
    matchLabels:
      app: phpmyadmin
  policyTypes:
    - Egress

  egress:
    # --- PhpMyAdmin → ProxySQL (DB) ---
    - to:
        - podSelector:
            matchLabels:
              app: proxysql
      ports:
        - protocol: TCP
          port: 3306

    # --- DNS ---
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
