# =============================================================================
# COUCHE 2 — MYSQL : Secret (credentials)
# =============================================================================
# Générer vos propres valeurs base64 AVANT de déployer :
#   echo -n "MonSuperMotDePasse" | base64
#
# Users créés dans ce stack :
#   root        → admin MySQL complet (usage interne uniquement)
#   wordpress   → accès à la DB wordpress (utilisé par WordPress et PhpMyAdmin)
#   replicator  → canal de réplication MGR entre membres du groupe
#   proxysql    → user de monitoring MySQL pour ProxySQL (lecture seule)
#   proxyadmin  → interface admin ProxySQL (port 6032)
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: wordpress
  labels:
    app.kubernetes.io/part-of: wordpress-stack
    app: mysql
type: Opaque
data:
  # ⚠️  REMPLACER TOUTES LES VALEURS CI-DESSOUS EN PRODUCTION

  # "rootpassword" — root MySQL
  root-password: cm9vdHBhc3N3b3Jk

  # "wppassword" — user wordpress (lecture/écriture sur DB wordpress)
  wordpress-password: d3BwYXNzd29yZA==

  # "replicator" — user dédié à la réplication MGR
  replication-password: cmVwbGljYXRvcg==

  # "proxyadmin" — user ProxySQL pour monitorer MySQL (REPLICATION CLIENT)
  proxysql-password: cHJveHlhZG1pbg==

  # "proxyadmin123" — mot de passe de l'interface admin ProxySQL (port 6032)
  proxysql-admin-password: cHJveHlhZG1pbjEyMw==
