# =============================================================================
# COUCHE 2 — MYSQL : StatefulSet
# =============================================================================
# Chaque pod contient 3 containers :
#
#  ┌─────────────────────────────────────────────────────────────┐
#  │  POD mysql-N                                                 │
#  │                                                              │
#  │  [init container]   init-mysql-config                       │
#  │    → génère /etc/mysql/conf.d/mgr.cnf                       │
#  │    → termine avant que les containers démarrent             │
#  │                                                              │
#  │  [container 1]      mysql                                   │
#  │    → mysqld (serveur principal)                              │
#  │    → liveness / readiness / startup probes                  │
#  │                                                              │
#  │  [container 2]      mgr-bootstrap                           │
#  │    → attend mysqld, crée les users, démarre MGR             │
#  │    → s'arrête après (comportement normal pour un sidecar    │
#  │      d'initialisation — restartPolicy: OnFailure idéal,     │
#  │      mais non supporté sur containers non-init avant K8s    │
#  │      1.29 sidecar gates → utilise une boucle de garde)      │
#  │                                                              │
#  │  [container 3]      mgr-monitor                             │
#  │    → boucle infinie, surveille le rôle MGR                  │
#  │    → écrit dans /mgr-status/role (volume emptyDir partagé)  │
#  │                                                              │
#  │  Volumes partagés entre containers du même pod :            │
#  │    mysql-conf-dir  (emptyDir) → mgr.cnf généré              │
#  │    mgr-status      (emptyDir) → rôle PRIMARY/SECONDARY      │
#  │                                                              │
#  │  Volume persistant (PVC via volumeClaimTemplate) :          │
#  │    mysql-data (10Gi NFS) → /var/lib/mysql                   │
#  └─────────────────────────────────────────────────────────────┘
# =============================================================================

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: wordpress
  labels:
    app.kubernetes.io/part-of: wordpress-stack
    app: mysql
spec:
  serviceName: mysql-headless      # Doit correspondre au Headless Service
  replicas: 3                      # 1 PRIMARY + 2 SECONDARY par défaut
  podManagementPolicy: OrderedReady  # mysql-0 démarre ET est READY avant mysql-1
  selector:
    matchLabels:
      app: mysql
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      # partition: 0 → mise à jour de tous les pods
      # partition: 2 → ne met à jour que mysql-2 (stratégie canary)
      partition: 0

  template:
    metadata:
      labels:
        app: mysql
        version: "8.0"
    spec:
      # ----------------------------------------------------------------
      # Terminaison : 60s pour que MySQL finisse ses transactions en cours
      # ----------------------------------------------------------------
      terminationGracePeriodSeconds: 60

      # ----------------------------------------------------------------
      # Anti-affinité : distribuer les pods sur des nœuds différents
      # "preferred" (pas "required") car vous avez seulement 1 worker.
      # En production multi-nœuds, passer à requiredDuringScheduling.
      # ----------------------------------------------------------------
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [mysql]
                topologyKey: kubernetes.io/hostname

      # ----------------------------------------------------------------
      # Security Context : mysqld ne doit pas tourner en root
      # ----------------------------------------------------------------
      securityContext:
        runAsUser: 999    # UID mysql dans l'image officielle
        runAsGroup: 999
        fsGroup: 999

      # ================================================================
      # INIT CONTAINER — s'exécute AVANT les containers principaux
      # ================================================================
      initContainers:
        - name: init-mysql-config
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          # command: ["/bin/bash", "/scripts/init.sh"]
          command:
          - /bin/bash
          - -c
          - |
            chown -R 999:999 /var/log/mysql  # Si un volume est monté ici
            /scripts/init.sh
          
          env:
            # POD_NAME injecté via Downward API → permet de dériver l'index
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # ⚠️  À synchroniser avec spec.replicas
            - name: REPLICAS
              value: "3"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            # Volume partagé avec le container mysql : contient mgr.cnf généré
            - name: mysql-conf-dir
              mountPath: /etc/mysql/conf.d
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

      # ================================================================
      # CONTAINERS PRINCIPAUX
      # ================================================================
      containers:

        # ==============================================================
        # CONTAINER 1 : mysql — le serveur MySQL principal
        # ==============================================================
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
            - name: mgr-xcom
              containerPort: 33061   # Port Paxos/XCOM pour MGR
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            # MySQL crée la DB au premier démarrage si le datadir est vide
            - name: MYSQL_DATABASE
              value: wordpress
          volumeMounts:
            # Données persistantes MySQL (PVC par pod)
            - name: mysql-data
              mountPath: /var/lib/mysql
            # Config statique (my.cnf)
            - name: mysql-config
              mountPath: /etc/mysql/my.cnf
              subPath: my.cnf
              readOnly: true
            # Config dynamique MGR (mgr.cnf généré par init container)
            - name: mysql-conf-dir
              mountPath: /etc/mysql/conf.d
            # Volume partagé pour exposer le rôle MGR au configurateur ProxySQL
            - name: mgr-status
              mountPath: /mgr-status

          # --------------------------------------------------------------
          # STARTUP PROBE
          # Laisse jusqu'à 10 min (60 essais × 10s) pour que MySQL
          # démarre — important si un clone est en cours au premier
          # démarrage d'un nouveau replica.
          # Tant que cette probe échoue, les autres probes ne sont pas
          # encore activées (évite les faux redémarrages pendant l'init).
          # --------------------------------------------------------------
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "mysql -uroot -p${MYSQL_ROOT_PASSWORD} -h127.0.0.1 -e 'SELECT 1'"
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 60     # 60 × 10s = 10 minutes
            timeoutSeconds: 5

          # --------------------------------------------------------------
          # LIVENESS PROBE
          # K8s redémarre le container si MySQL ne répond plus du tout.
          # Activée uniquement après que startupProbe a réussi.
          # --------------------------------------------------------------
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "mysql -uroot -p${MYSQL_ROOT_PASSWORD} -h127.0.0.1 -e 'SELECT 1'"
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 5

          # --------------------------------------------------------------
          # READINESS PROBE
          # Un pod n'est marqué READY (et donc reçoit du trafic)
          # que s'il est ONLINE dans le groupe MGR.
          # Cela évite qu'un replica en retard de réplication reçoive
          # des lectures avec des données potentiellement obsolètes.
          # --------------------------------------------------------------
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  mysql -uroot -p${MYSQL_ROOT_PASSWORD} -h127.0.0.1 -sN -e "
                    SELECT COUNT(*)
                    FROM performance_schema.replication_group_members
                    WHERE MEMBER_HOST LIKE CONCAT(@@report_host, '%')
                      AND MEMBER_STATE = 'ONLINE';
                  " | grep -q "^1$"
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
            successThreshold: 1
            timeoutSeconds: 5

          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

        # ==============================================================
        # CONTAINER 2 : mgr-bootstrap
        # Sidecar qui configure et démarre MGR après mysqld.
        # Se termine naturellement après avoir fini son travail.
        # En cas d'échec, K8s le redémarrera (restartPolicy du pod = Always).
        # ==============================================================
        - name: mgr-bootstrap
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              # Exécuter bootstrap.sh puis dormir indéfiniment
              # (empêche K8s de redémarrer le pod en boucle une fois terminé)
              /scripts/bootstrap.sh
              echo "[mgr-bootstrap] Bootstrap terminé — passage en veille."
              while true; do sleep 3600; done
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REPLICAS
              value: "3"
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            - name: MYSQL_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: replication-password
            - name: MYSQL_PROXYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: proxysql-password
            - name: MYSQL_WORDPRESS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: wordpress-password
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

        # ==============================================================
        # CONTAINER 3 : mgr-monitor
        # Boucle infinie — surveille le rôle MGR de ce pod et
        # écrit le résultat dans /mgr-status/role (emptyDir).
        # Le sidecar du pod ProxySQL lit ces fichiers via l'API K8s.
        # ==============================================================
        - name: mgr-monitor
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "/scripts/mgr-monitor.sh"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: mgr-status
              mountPath: /mgr-status
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi

      # ================================================================
      # VOLUMES partagés (intra-pod uniquement)
      # ================================================================
      volumes:
        # Scripts bash (montés depuis ConfigMap, en lecture seule)
        - name: scripts
          configMap:
            name: mysql-init-scripts
            defaultMode: 0755       # exécutable

        # my.cnf statique (depuis ConfigMap)
        - name: mysql-config
          configMap:
            name: mysql-config

        # mgr.cnf dynamique — écrit par init container, lu par mysqld
        - name: mysql-conf-dir
          emptyDir: {}

        # Rôle MGR courant — écrit par mgr-monitor, lu par ProxySQL configurator
        - name: mgr-status
          emptyDir: {}

  # ================================================================
  # VOLUME CLAIM TEMPLATES
  # Un PVC est créé automatiquement PAR pod :
  #   mysql-data-mysql-0  (10Gi, NFS)
  #   mysql-data-mysql-1  (10Gi, NFS)
  #   mysql-data-mysql-2  (10Gi, NFS)
  #
  # Ces PVCs survivent à la suppression des pods ET du StatefulSet
  # (grâce à reclaimPolicy: Retain sur la StorageClass).
  # ================================================================
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
        labels:
          app: mysql
      spec:
        accessModes: ["ReadWriteOnce"]   # 1 seul pod par PVC (standard pour DB)
        # storageClassName: nfs-mysql
        storageClassName: example-nfs
        resources:
          requests:
            # storage: 10Gi
            storage: 3Gi
