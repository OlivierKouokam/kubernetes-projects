# =============================================================================
# COUCHE 1 — STORAGE : StorageClass NFS
# =============================================================================
# Prérequis : le NFS Subdir External Provisioner doit être installé
# via Helm avant d'appliquer ce manifest.
#
#   helm repo add nfs-subdir-external-provisioner \
#     https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner/
#
#   helm install nfs-provisioner \
#     nfs-subdir-external-provisioner/nfs-subdir-external-provisioner \
#     --namespace nfs-provisioner --create-namespace \
#     --set nfs.server=192.168.x.x \        ← IP de votre serveur NFS
#     --set nfs.path=/srv/nfs/k8s \         ← export NFS
#     --set storageClass.name=nfs-mysql \
#     --set storageClass.reclaimPolicy=Retain
#
# La StorageClass ci-dessous est déclarée séparément pour garder
# le contrôle fin sur les paramètres (reclaimPolicy, archiveOnDelete).
# =============================================================================

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-mysql
  labels:
    app.kubernetes.io/part-of: wordpress-stack
  annotations:
    # Ne pas définir comme classe par défaut du cluster
    storageclass.kubernetes.io/is-default-class: "false"

# ⚠️  Adapter le nom du provisioner selon votre installation Helm
# Vérifier avec : kubectl get pods -n nfs-provisioner
provisioner: cluster.local/nfs-provisioner-nfs-subdir-external-provisioner

parameters:
  # "true" = renomme le répertoire NFS avec un préfixe "archived-"
  # au lieu de le supprimer quand le PVC est effacé
  archiveOnDelete: "true"

# RETAIN = le PersistentVolume n'est PAS supprimé quand le PVC est effacé.
# Critique en production pour éviter la perte de données accidentelle.
reclaimPolicy: Retain

# Immediate = le PV est créé dès que le PVC est soumis (pas d'attente du pod)
volumeBindingMode: Immediate

# Permet d'agrandir un PVC sans le recréer (kubectl patch pvc ...)
allowVolumeExpansion: true
