# =============================================================================
# MYSQL 8 HIGH AVAILABILITY STACK - PRODUCTION READY
# =============================================================================
# Architecture : MySQL Group Replication (MGR) + ProxySQL
# Topologie    : 1 Primary (writer) + N Replicas (readers)
# Failover     : Automatique via MGR natif MySQL 8
# Routage      : ProxySQL sépare READ / WRITE dynamiquement
# Scale        : kubectl scale statefulset mysql --replicas=N
#
# Ordre de déploiement :
#   1. Namespace
#   2. ConfigMaps
#   3. Secrets
#   4. StorageClass (adapter à votre NFS)
#   5. Headless Service MySQL
#   6. StatefulSet MySQL
#   7. ProxySQL ConfigMap + Deployment
#   8. ProxySQL Service (ClusterIP)
# =============================================================================

---
# =============================================================================
# 1. NAMESPACE
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: wordpress
  labels:
    app.kubernetes.io/part-of: wordpress-stack

---
# =============================================================================
# 2. SECRET - Credentials MySQL
# Générer les valeurs base64 :
#   echo -n "votre_password" | base64
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: wordpress
type: Opaque
data:
  # "rootpassword" en base64 → à changer en production !
  root-password: cm9vdHBhc3N3b3Jk
  # "wppassword" en base64
  wordpress-password: d3BwYXNzd29yZA==
  # "replicator" en base64 (user dédié à la réplication MGR)
  replication-password: cmVwbGljYXRvcg==
  # "proxyadmin" en base64 (user ProxySQL → MySQL)
  proxysql-password: cHJveHlhZG1pbg==
  # "proxyadmin123" en base64 (interface admin ProxySQL)
  proxysql-admin-password: cHJveHlhZG1pbjEyMw==

---
# =============================================================================
# 3. CONFIGMAP - Configuration MySQL (my.cnf)
# Paramètres critiques pour MySQL Group Replication
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: wordpress
data:
  # ------------------------------------------------------------------
  # my.cnf : configuration de base MySQL avec Group Replication activé
  # ------------------------------------------------------------------
  my.cnf: |
    [mysqld]
    # --- Identité du nœud (sera surchargé par init container) ---
    server-id                         = 1
    bind-address                      = 0.0.0.0
    port                              = 3306

    # --- Réplication GTID (obligatoire pour MGR) ---
    gtid_mode                         = ON
    enforce_gtid_consistency          = ON
    log_bin                           = mysql-bin
    log_slave_updates                 = ON
    binlog_format                     = ROW
    binlog_checksum                   = NONE

    # --- Group Replication ---
    plugin_load_add                   = group_replication.so
    group_replication_group_name      = "aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee"
    group_replication_start_on_boot   = OFF
    group_replication_local_address   = ""         # surchargé au démarrage
    group_replication_group_seeds     = ""         # surchargé au démarrage
    group_replication_bootstrap_group = OFF
    group_replication_single_primary_mode           = ON
    group_replication_enforce_update_everywhere_checks = OFF

    # --- Performance & InnoDB ---
    innodb_buffer_pool_size           = 256M
    innodb_log_file_size              = 64M
    innodb_flush_log_at_trx_commit    = 1
    sync_binlog                       = 1

    # --- Clone Plugin (pour nouveaux replicas) ---
    plugin_load_add                   = mysql_clone.so

    # --- Divers ---
    default_authentication_plugin     = mysql_native_password
    character-set-server              = utf8mb4
    collation-server                  = utf8mb4_unicode_ci
    max_connections                   = 500
    slow_query_log                    = ON
    slow_query_log_file               = /var/log/mysql/slow.log
    long_query_time                   = 2

---
# =============================================================================
# 4. CONFIGMAP - Script d'initialisation MySQL (init container)
# Rôle : configurer server-id unique, adresses MGR, lancer la réplication
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-scripts
  namespace: wordpress
data:
  # ------------------------------------------------------------------
  # init.sh : exécuté par l'init container AVANT le démarrage de mysqld
  # Il configure dynamiquement le my.cnf selon le nom du pod
  # (mysql-0, mysql-1, mysql-2...) et démarre la réplication MGR
  # ------------------------------------------------------------------
  init.sh: |
    #!/bin/bash
    set -e

    # --- Variables d'environnement ---
    POD_NAME=${POD_NAME}                    # injecté via fieldRef
    NAMESPACE=${NAMESPACE}
    HEADLESS_SVC="mysql-headless"
    REPLICAS=${REPLICAS:-3}                 # nombre de replicas attendus
    GROUP_NAME="aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee"

    # --- Dériver le server-id depuis l'index du pod (mysql-0 → 1, mysql-1 → 2...) ---
    POD_INDEX=$(echo ${POD_NAME} | awk -F'-' '{print $NF}')
    SERVER_ID=$((POD_INDEX + 1))

    # --- Adresse locale MGR pour ce pod ---
    LOCAL_ADDRESS="${POD_NAME}.${HEADLESS_SVC}.${NAMESPACE}.svc.cluster.local:33061"

    # --- Construire la liste des seeds MGR (tous les pods sauf soi-même) ---
    SEEDS=""
    for i in $(seq 0 $((REPLICAS - 1))); do
      SEED="mysql-${i}.${HEADLESS_SVC}.${NAMESPACE}.svc.cluster.local:33061"
      if [ "${SEED}" != "${LOCAL_ADDRESS}" ]; then
        SEEDS="${SEEDS}${SEED},"
      fi
    done
    SEEDS="${SEEDS%,}"  # supprimer la virgule finale

    # --- Écrire le my.cnf final dans le volume partagé ---
    cat > /etc/mysql/conf.d/mgr.cnf <<EOF
    [mysqld]
    server-id                         = ${SERVER_ID}
    group_replication_local_address   = "${LOCAL_ADDRESS}"
    group_replication_group_seeds     = "${SEEDS}"
    report_host                       = ${POD_NAME}.${HEADLESS_SVC}.${NAMESPACE}.svc.cluster.local
    EOF

    echo "[init] Config MGR écrite pour ${POD_NAME} (server-id=${SERVER_ID})"
    echo "[init] Local: ${LOCAL_ADDRESS}"
    echo "[init] Seeds: ${SEEDS}"

  # ------------------------------------------------------------------
  # bootstrap.sh : exécuté par le sidecar MGR après démarrage de MySQL
  # Rôle : créer les users, configurer et démarrer MGR
  # ------------------------------------------------------------------
  bootstrap.sh: |
    #!/bin/bash
    set -e

    POD_NAME=${POD_NAME}
    POD_INDEX=$(echo ${POD_NAME} | awk -F'-' '{print $NF}')
    NAMESPACE=${NAMESPACE}
    HEADLESS_SVC="mysql-headless"
    REPLICAS=${REPLICAS:-3}

    ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    REPL_PASSWORD=${MYSQL_REPLICATION_PASSWORD}
    PROXY_PASSWORD=${MYSQL_PROXYSQL_PASSWORD}
    WP_PASSWORD=${MYSQL_WORDPRESS_PASSWORD}

    MYSQL_CMD="mysql -uroot -p${ROOT_PASSWORD} -h127.0.0.1 --connect-timeout=10"

    # --- Attendre que MySQL soit prêt ---
    echo "[bootstrap] Attente de MySQL..."
    until ${MYSQL_CMD} -e "SELECT 1" &>/dev/null; do
      echo "[bootstrap] MySQL pas encore prêt, retry dans 5s..."
      sleep 5
    done
    echo "[bootstrap] MySQL est prêt."

    # --- Créer les users nécessaires (idempotent) ---
    ${MYSQL_CMD} <<-SQL
      -- User pour WordPress
      CREATE USER IF NOT EXISTS 'wordpress'@'%' IDENTIFIED BY '${WP_PASSWORD}';
      GRANT ALL PRIVILEGES ON wordpress.* TO 'wordpress'@'%';

      -- User pour ProxySQL (monitoring + routage)
      CREATE USER IF NOT EXISTS 'proxysql'@'%' IDENTIFIED BY '${PROXY_PASSWORD}';
      GRANT USAGE, REPLICATION CLIENT, SELECT ON *.* TO 'proxysql'@'%';

      -- User pour MGR (réplication entre membres)
      CREATE USER IF NOT EXISTS 'replicator'@'%' IDENTIFIED BY '${REPL_PASSWORD}';
      GRANT REPLICATION SLAVE ON *.* TO 'replicator'@'%';
      GRANT BACKUP_ADMIN ON *.* TO 'replicator'@'%';   -- nécessaire pour Clone Plugin
      GRANT CLONE_ADMIN ON *.* TO 'replicator'@'%';

      -- User pour PhpMyAdmin
      CREATE USER IF NOT EXISTS 'phpmyadmin'@'%' IDENTIFIED BY '${WP_PASSWORD}';
      GRANT ALL PRIVILEGES ON *.* TO 'phpmyadmin'@'%';

      -- Créer la DB WordPress
      CREATE DATABASE IF NOT EXISTS wordpress CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;

      FLUSH PRIVILEGES;
    SQL

    # --- Configurer le canal de réplication MGR ---
    ${MYSQL_CMD} <<-SQL
      CHANGE MASTER TO
        MASTER_USER='replicator',
        MASTER_PASSWORD='${REPL_PASSWORD}'
      FOR CHANNEL 'group_replication_recovery';
    SQL

    # --- Démarrer MGR ---
    if [ "${POD_INDEX}" = "0" ]; then
      echo "[bootstrap] mysql-0 détecté → bootstrap du groupe MGR"
      ${MYSQL_CMD} -e "SET GLOBAL group_replication_bootstrap_group=ON;"
      ${MYSQL_CMD} -e "START GROUP_REPLICATION;"
      ${MYSQL_CMD} -e "SET GLOBAL group_replication_bootstrap_group=OFF;"
    else
      echo "[bootstrap] mysql-${POD_INDEX} → rejoint le groupe MGR existant"
      # Cloner les données depuis mysql-0 si le datadir est vide
      DATA_SIZE=$(du -s /var/lib/mysql | awk '{print $1}')
      if [ "${DATA_SIZE}" -lt "10000" ]; then
        echo "[bootstrap] Datadir vide, démarrage du clone depuis mysql-0..."
        PRIMARY_HOST="mysql-0.${HEADLESS_SVC}.${NAMESPACE}.svc.cluster.local"
        ${MYSQL_CMD} -e "SET GLOBAL clone_valid_donor_list='${PRIMARY_HOST}:3306';"
        ${MYSQL_CMD} -e "CLONE INSTANCE FROM 'replicator'@'${PRIMARY_HOST}':3306 IDENTIFIED BY '${REPL_PASSWORD}';"
        echo "[bootstrap] Clone terminé, redémarrage de MySQL attendu..."
        sleep 10  # MySQL redémarre automatiquement après clone
      fi
      until ${MYSQL_CMD} -e "SELECT 1" &>/dev/null; do sleep 2; done
      ${MYSQL_CMD} -e "START GROUP_REPLICATION;"
    fi

    echo "[bootstrap] MGR démarré pour ${POD_NAME}"

  # ------------------------------------------------------------------
  # mgr-monitor.sh : boucle infinie dans le sidecar de CHAQUE pod MySQL
  # Rôle : surveiller l'état MGR local et notifier le sidecar ProxySQL
  # Ce script expose l'état via un fichier partagé (emptyDir volume)
  # ------------------------------------------------------------------
  mgr-monitor.sh: |
    #!/bin/bash
    set -e

    POD_NAME=${POD_NAME}
    ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    MYSQL_CMD="mysql -uroot -p${ROOT_PASSWORD} -h127.0.0.1 --connect-timeout=5 -sN"
    STATUS_FILE="/mgr-status/role"      # volume partagé avec le pod principal

    while true; do
      ROLE=$(${MYSQL_CMD} -e "
        SELECT MEMBER_ROLE
        FROM performance_schema.replication_group_members
        WHERE MEMBER_HOST LIKE '$(hostname)%'
        AND MEMBER_STATE = 'ONLINE'
        LIMIT 1;
      " 2>/dev/null || echo "UNKNOWN")

      echo "${ROLE}" > "${STATUS_FILE}"
      echo "[monitor] ${POD_NAME} → ${ROLE}"
      sleep 10
    done

---
# =============================================================================
# 5. CONFIGMAP - Script du sidecar ProxySQL (configurateur dynamique)
# Rôle : interroger MGR sur tous les pods MySQL et mettre à jour ProxySQL
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: proxysql-configurator
  namespace: wordpress
data:
  # ------------------------------------------------------------------
  # configurator.py : tourne dans le sidecar du pod ProxySQL
  # Boucle toutes les 15s, interroge MGR, sync avec ProxySQL Admin API
  # ------------------------------------------------------------------
  configurator.py: |
    #!/usr/bin/env python3
    """
    ProxySQL Dynamic Configurator
    Surveille la topologie MySQL Group Replication et met à jour
    ProxySQL en temps réel (ajout/suppression de membres, changement de primary)
    """
    import time
    import os
    import subprocess
    import logging

    logging.basicConfig(
        level=logging.INFO,
        format='%(asctime)s [%(levelname)s] %(message)s'
    )
    log = logging.getLogger(__name__)

    # --- Config depuis variables d'environnement ---
    NAMESPACE        = os.environ.get("NAMESPACE", "wordpress")
    HEADLESS_SVC     = os.environ.get("HEADLESS_SVC", "mysql-headless")
    REPLICAS         = int(os.environ.get("REPLICAS", "3"))
    MYSQL_USER       = os.environ.get("PROXYSQL_MYSQL_USER", "proxysql")
    MYSQL_PASS       = os.environ.get("PROXYSQL_MYSQL_PASS", "proxyadmin")
    PROXY_ADMIN_HOST = os.environ.get("PROXY_ADMIN_HOST", "127.0.0.1")
    PROXY_ADMIN_PORT = os.environ.get("PROXY_ADMIN_PORT", "6032")
    PROXY_ADMIN_USER = os.environ.get("PROXY_ADMIN_USER", "admin")
    PROXY_ADMIN_PASS = os.environ.get("PROXY_ADMIN_PASS", "proxyadmin123")
    INTERVAL         = int(os.environ.get("SYNC_INTERVAL", "15"))

    # Hostgroup IDs (convention ProxySQL)
    HG_WRITER = 10   # 1 seul writer (primary MGR)
    HG_READER = 20   # tous les readers (replicas MGR)

    def mysql_query(host, query, port=3306):
        """Exécute une requête MySQL et retourne la sortie."""
        cmd = [
            "mysql",
            f"-u{MYSQL_USER}",
            f"-p{MYSQL_PASS}",
            f"-h{host}",
            f"-P{str(port)}",
            "--connect-timeout=3",
            "-sN",
            "-e", query
        ]
        try:
            result = subprocess.run(cmd, capture_output=True, text=True, timeout=5)
            return result.stdout.strip()
        except Exception as e:
            log.warning(f"Query failed on {host}: {e}")
            return None

    def proxy_admin_query(query):
        """Exécute une requête sur l'interface admin de ProxySQL."""
        cmd = [
            "mysql",
            f"-u{PROXY_ADMIN_USER}",
            f"-p{PROXY_ADMIN_PASS}",
            f"-h{PROXY_ADMIN_HOST}",
            f"-P{PROXY_ADMIN_PORT}",
            "--connect-timeout=3",
            "-sN",
            "-e", query
        ]
        try:
            result = subprocess.run(cmd, capture_output=True, text=True, timeout=5)
            return result.stdout.strip()
        except Exception as e:
            log.error(f"ProxySQL admin query failed: {e}")
            return None

    def get_mgr_topology():
        """
        Interroge un membre MGR disponible pour obtenir la topologie complète.
        Retourne un dict : {host: role} où role est PRIMARY ou SECONDARY
        """
        for i in range(REPLICAS):
            host = f"mysql-{i}.{HEADLESS_SVC}.{NAMESPACE}.svc.cluster.local"
            result = mysql_query(host, """
                SELECT MEMBER_HOST, MEMBER_ROLE
                FROM performance_schema.replication_group_members
                WHERE MEMBER_STATE = 'ONLINE';
            """)
            if result:
                topology = {}
                for line in result.split('\n'):
                    parts = line.strip().split('\t')
                    if len(parts) == 2:
                        member_host, role = parts
                        topology[member_host] = role
                log.info(f"Topologie MGR récupérée depuis mysql-{i}: {topology}")
                return topology
        log.error("Impossible de récupérer la topologie MGR depuis aucun pod")
        return {}

    def get_current_proxysql_hosts():
        """Récupère les membres actuellement configurés dans ProxySQL."""
        result = proxy_admin_query(
            "SELECT hostgroup_id, hostname FROM mysql_servers;"
        )
        hosts = {}
        if result:
            for line in result.split('\n'):
                parts = line.strip().split('\t')
                if len(parts) == 2:
                    hg, host = int(parts[0]), parts[1]
                    hosts.setdefault(hg, set()).add(host)
        return hosts

    def sync_proxysql(topology):
        """
        Synchronise ProxySQL avec la topologie MGR courante.
        - PRIMARY → hostgroup 10 (writer)
        - SECONDARY → hostgroup 20 (reader)
        """
        if not topology:
            log.warning("Topologie vide, sync ignorée")
            return

        current = get_current_proxysql_hosts()
        desired_writers = set()
        desired_readers = set()

        for host, role in topology.items():
            if role == "PRIMARY":
                desired_writers.add(host)
            elif role == "SECONDARY":
                desired_readers.add(host)

        log.info(f"Writers souhaités  : {desired_writers}")
        log.info(f"Readers souhaités  : {desired_readers}")
        log.info(f"Config ProxySQL actuelle : {current}")

        # Construire les requêtes de mise à jour
        queries = []

        # Retirer les anciens writers qui ne sont plus primary
        for host in current.get(HG_WRITER, set()) - desired_writers:
            queries.append(
                f"DELETE FROM mysql_servers WHERE hostgroup_id={HG_WRITER} AND hostname='{host}';"
            )
            log.info(f"Retrait writer: {host}")

        # Retirer les anciens readers qui ne sont plus dans MGR
        for host in current.get(HG_READER, set()) - desired_readers:
            queries.append(
                f"DELETE FROM mysql_servers WHERE hostgroup_id={HG_READER} AND hostname='{host}';"
            )
            log.info(f"Retrait reader: {host}")

        # Ajouter les nouveaux writers
        for host in desired_writers - current.get(HG_WRITER, set()):
            queries.append(f"""
                INSERT INTO mysql_servers
                  (hostgroup_id, hostname, port, weight, max_connections, comment)
                VALUES
                  ({HG_WRITER}, '{host}', 3306, 1000, 100, 'PRIMARY - auto');
            """)
            log.info(f"Ajout writer: {host}")

        # Ajouter les nouveaux readers
        for host in desired_readers - current.get(HG_READER, set()):
            queries.append(f"""
                INSERT INTO mysql_servers
                  (hostgroup_id, hostname, port, weight, max_connections, comment)
                VALUES
                  ({HG_READER}, '{host}', 3306, 100, 200, 'SECONDARY - auto');
            """)
            log.info(f"Ajout reader: {host}")

        if queries:
            for q in queries:
                proxy_admin_query(q)
            # Sauvegarder en mémoire (LOAD) et sur disque (SAVE)
            proxy_admin_query("LOAD MYSQL SERVERS TO RUNTIME;")
            proxy_admin_query("SAVE MYSQL SERVERS TO DISK;")
            log.info("ProxySQL synchronisé et sauvegardé.")
        else:
            log.info("ProxySQL déjà à jour, aucune modification.")

    def main():
        log.info("=== ProxySQL Dynamic Configurator démarré ===")
        log.info(f"Namespace: {NAMESPACE}, Replicas attendus: {REPLICAS}")
        log.info(f"Interval de sync: {INTERVAL}s")

        while True:
            try:
                topology = get_mgr_topology()
                sync_proxysql(topology)
            except Exception as e:
                log.error(f"Erreur lors de la sync: {e}")
            time.sleep(INTERVAL)

    if __name__ == "__main__":
        main()

---
# =============================================================================
# 6. CONFIGMAP - Configuration statique initiale ProxySQL
# Bootstrappe ProxySQL au premier démarrage (avant que le configurateur tourne)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: proxysql-config
  namespace: wordpress
data:
  proxysql.cnf: |
    # ===========================================================
    # ProxySQL Configuration initiale
    # Le configurateur Python mettra à jour mysql_servers
    # dynamiquement - cette config est juste un point de départ
    # ===========================================================

    datadir="/var/lib/proxysql"

    admin_variables=
    {
        admin_credentials="admin:proxyadmin123"   # CHANGER en production
        mysql_ifaces="0.0.0.0:6032"              # port admin (interne seulement)
        refresh_interval=2000
    }

    mysql_variables=
    {
        threads=4
        max_connections=2048
        default_query_delay=0
        default_query_timeout=36000000
        have_compress=true
        poll_timeout=2000
        interfaces="0.0.0.0:6033"              # port SQL (exposé aux apps)
        default_schema="information_schema"
        stacksize=1048576
        server_version="8.0.30"
        connect_timeout_server=3000
        monitor_username="proxysql"
        monitor_password="proxyadmin"          # doit correspondre au Secret
        monitor_history=600000
        monitor_connect_interval=60000
        monitor_ping_interval=10000
        ping_interval_server_msec=10000
        ping_timeout_server=200
        commands_stats=true
        sessions_sort=true
        connect_retries_on_failure=10
    }

    # Hostgroups : 10 = writer, 20 = readers
    # Sera remplacé dynamiquement par le configurateur Python
    mysql_servers=
    (
        {
            address="mysql-0.mysql-headless.wordpress.svc.cluster.local"
            port=3306
            hostgroup=10
            status="ONLINE"
            weight=1000
            max_connections=100
            comment="Initial bootstrap - writer"
        },
        {
            address="mysql-1.mysql-headless.wordpress.svc.cluster.local"
            port=3306
            hostgroup=20
            status="ONLINE"
            weight=100
            max_connections=200
            comment="Initial bootstrap - reader"
        },
        {
            address="mysql-2.mysql-headless.wordpress.svc.cluster.local"
            port=3306
            hostgroup=20
            status="ONLINE"
            weight=100
            max_connections=200
            comment="Initial bootstrap - reader"
        }
    )

    # Credentials que ProxySQL utilisera pour se connecter à MySQL
    mysql_users=
    (
        {
            username="wordpress"
            password="wppassword"           # doit correspondre au Secret
            default_hostgroup=10           # par défaut → writer
            active=1
            transaction_persistent=1       # CRITICAL: maintient la session en cours
        },
        {
            username="phpmyadmin"
            password="wppassword"
            default_hostgroup=10
            active=1
        },
        {
            username="proxysql"
            password="proxyadmin"
            default_hostgroup=10
            active=1
        }
    )

    # Règles de routage READ/WRITE
    # Les requêtes SELECT vont vers hostgroup 20 (readers)
    # Tout le reste va vers hostgroup 10 (writer)
    mysql_query_rules=
    (
        {
            rule_id=1
            active=1
            match_pattern="^SELECT .* FOR UPDATE"   # SELECT FOR UPDATE → writer
            destination_hostgroup=10
            apply=1
            comment="SELECT FOR UPDATE → writer (locking)"
        },
        {
            rule_id=2
            active=1
            match_pattern="^SELECT"                 # SELECT simple → readers
            destination_hostgroup=20
            apply=1
            comment="SELECT → readers (load balanced)"
        }
        # Toute autre requête (INSERT, UPDATE, DELETE, DDL) → hostgroup 10 (writer)
    )

---
# =============================================================================
# 7. STORAGECLASS - NFS Dynamic Provisioner
# Adapter server et path selon votre environnement NFS
# =============================================================================
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-mysql
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: cluster.local/nfs-subdir-external-provisioner  # à adapter
parameters:
  archiveOnDelete: "true"   # archive les données au lieu de les supprimer
reclaimPolicy: Retain        # CRITICAL en production : ne pas supprimer les PV
volumeBindingMode: Immediate
allowVolumeExpansion: true

---
# =============================================================================
# 8. HEADLESS SERVICE - MySQL (découverte DNS pod par pod)
# ClusterIP: None → chaque pod a son propre enregistrement DNS
# Utilisé par MGR pour la communication entre membres
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: mysql-headless
  namespace: wordpress
  labels:
    app: mysql
    role: headless
spec:
  clusterIP: None             # Headless : pas de VIP, résolution directe pod
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
    - name: mgr                # Port MGR pour la communication inter-membres
      port: 33061
      targetPort: 33061
  publishNotReadyAddresses: true  # CRITICAL: permet aux pods de se découvrir
                                   # même pendant le démarrage

---
# =============================================================================
# 9. STATEFULSET - MySQL 8 avec Group Replication
#
# Chaque pod contient :
#   - Container principal : mysqld
#   - Init container     : configure my.cnf avec server-id et adresses MGR
#   - Sidecar container  : bootstrap.sh (lance MGR après démarrage MySQL)
#   - Sidecar container  : mgr-monitor.sh (surveille l'état MGR)
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: wordpress
  labels:
    app: mysql
spec:
  serviceName: mysql-headless    # Lié au Headless Service
  replicas: 3                    # 1 primary + 2 replicas
  selector:
    matchLabels:
      app: mysql
  # -----------------------------------------------------------------------
  # updateStrategy : RollingUpdate avec partition → mise à jour contrôlée
  # partition: 0 → mettre à jour tous les pods
  # partition: N → ne mettre à jour que les pods >= N (canary)
  # -----------------------------------------------------------------------
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  template:
    metadata:
      labels:
        app: mysql
        version: "8.0"
    spec:
      # -----------------------------------------------------------------------
      # Affinité : distribuer les pods MySQL sur des nœuds différents
      # En environnement 1M+1W, utiliser preferredDuringScheduling
      # -----------------------------------------------------------------------
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [mysql]
                topologyKey: kubernetes.io/hostname

      # -----------------------------------------------------------------------
      # INIT CONTAINER : configure my.cnf avant de démarrer mysqld
      # -----------------------------------------------------------------------
      initContainers:
        - name: init-mysql-config
          image: mysql:8.0
          command: ["/bin/bash", "/scripts/init.sh"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REPLICAS
              value: "3"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: mysql-conf-dir
              mountPath: /etc/mysql/conf.d
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

      # -----------------------------------------------------------------------
      # CONTAINERS PRINCIPAUX
      # -----------------------------------------------------------------------
      containers:

        # --- Container 1 : MySQL principal ---
        - name: mysql
          image: mysql:8.0
          ports:
            - name: mysql
              containerPort: 3306
            - name: mgr
              containerPort: 33061
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            - name: MYSQL_DATABASE
              value: wordpress
            # Les autres users sont créés par bootstrap.sh
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: mysql-conf-dir
              mountPath: /etc/mysql/conf.d
            - name: mysql-config
              mountPath: /etc/mysql/my.cnf
              subPath: my.cnf
            - name: mgr-status
              mountPath: /mgr-status
          # ---------------------------------------------------------------
          # PROBES
          # ---------------------------------------------------------------
          # startupProbe : laisse le temps à MySQL de démarrer (clone inclus)
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "mysql -uroot -p${MYSQL_ROOT_PASSWORD} -h127.0.0.1 -e 'SELECT 1'"
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30      # 30 * 10s = 5 minutes max
            timeoutSeconds: 5
          # livenessProbe : vérifie que MySQL répond
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "mysql -uroot -p${MYSQL_ROOT_PASSWORD} -h127.0.0.1 -e 'SELECT 1'"
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 5
          # readinessProbe : vérifie que ce pod est ONLINE dans MGR
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  mysql -uroot -p${MYSQL_ROOT_PASSWORD} -h127.0.0.1 -sN -e "
                    SELECT COUNT(*) FROM performance_schema.replication_group_members
                    WHERE MEMBER_HOST LIKE '$(hostname)%' AND MEMBER_STATE='ONLINE';
                  " | grep -q "^1$"
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

        # --- Container 2 : Sidecar Bootstrap (initialise MGR après démarrage) ---
        - name: mgr-bootstrap
          image: mysql:8.0
          command: ["/bin/bash", "/scripts/bootstrap.sh"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REPLICAS
              value: "3"
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            - name: MYSQL_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: replication-password
            - name: MYSQL_PROXYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: proxysql-password
            - name: MYSQL_WORDPRESS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: wordpress-password
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

        # --- Container 3 : Sidecar Monitor (surveille l'état MGR en continu) ---
        - name: mgr-monitor
          image: mysql:8.0
          command: ["/bin/bash", "/scripts/mgr-monitor.sh"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: mgr-status
              mountPath: /mgr-status
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi

      # -----------------------------------------------------------------------
      # VOLUMES (partagés entre containers du même pod)
      # -----------------------------------------------------------------------
      volumes:
        - name: scripts
          configMap:
            name: mysql-init-scripts
            defaultMode: 0755        # exécutable
        - name: mysql-config
          configMap:
            name: mysql-config
        - name: mysql-conf-dir
          emptyDir: {}               # modifiable par init container
        - name: mgr-status
          emptyDir: {}               # partage état MGR entre mysql et mgr-monitor

  # -----------------------------------------------------------------------
  # VOLUME CLAIM TEMPLATES : un PVC par pod (données MySQL persistantes)
  # -----------------------------------------------------------------------
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: ["ReadWriteOnce"]   # 1 pod par PVC (standard pour DB)
        storageClassName: nfs-mysql
        resources:
          requests:
            storage: 10Gi

---
# =============================================================================
# 10. DEPLOYMENT - ProxySQL
#
# Pod contient :
#   - Container principal : proxysql (reverse proxy SQL)
#   - Sidecar            : configurator.py (sync dynamique avec MGR)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxysql
  namespace: wordpress
  labels:
    app: proxysql
spec:
  replicas: 1           # 1 seule instance ProxySQL (suffit en lab/SME)
                        # Pour HA ProxySQL lui-même → utiliser ProxySQL Cluster
  selector:
    matchLabels:
      app: proxysql
  template:
    metadata:
      labels:
        app: proxysql
    spec:
      containers:

        # --- Container 1 : ProxySQL ---
        - name: proxysql
          image: proxysql/proxysql:2.5.5
          ports:
            - name: sql
              containerPort: 6033      # port SQL pour les applications
            - name: admin
              containerPort: 6032      # port admin (interne seulement)
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
          volumeMounts:
            - name: proxysql-config
              mountPath: /etc/proxysql.cnf
              subPath: proxysql.cnf
            - name: proxysql-data
              mountPath: /var/lib/proxysql
          livenessProbe:
            tcpSocket:
              port: 6033
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 6033
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

        # --- Container 2 : Sidecar Configurateur Python ---
        - name: proxysql-configurator
          image: python:3.11-slim
          command:
            - /bin/sh
            - -c
            - |
              # Installer le client MySQL (nécessaire pour exécuter mysql CLI)
              apt-get update -qq && apt-get install -y -qq default-mysql-client
              python3 /configurator/configurator.py
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HEADLESS_SVC
              value: "mysql-headless"
            - name: REPLICAS
              value: "3"             # ⚠️ À mettre à jour si vous scalez manuellement
                                     # Idéalement, injecter via Downward API ou Operator
            - name: PROXYSQL_MYSQL_USER
              value: "proxysql"
            - name: PROXYSQL_MYSQL_PASS
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: proxysql-password
            - name: PROXY_ADMIN_HOST
              value: "127.0.0.1"
            - name: PROXY_ADMIN_PORT
              value: "6032"
            - name: PROXY_ADMIN_USER
              value: "admin"
            - name: PROXY_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: proxysql-admin-password
            - name: SYNC_INTERVAL
              value: "15"
          volumeMounts:
            - name: configurator-script
              mountPath: /configurator
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

      volumes:
        - name: proxysql-config
          configMap:
            name: proxysql-config
        - name: configurator-script
          configMap:
            name: proxysql-configurator
            defaultMode: 0755
        - name: proxysql-data
          emptyDir: {}     # Les données ProxySQL sont régénérées au démarrage

---
# =============================================================================
# 11. SERVICE - ProxySQL ClusterIP (point d'entrée unique pour les apps)
#
# Les applications (WordPress, PhpMyAdmin) se connectent à ce service.
# ProxySQL route ensuite vers le bon backend MySQL.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: proxysql-svc
  namespace: wordpress
  labels:
    app: proxysql
spec:
  type: ClusterIP
  selector:
    app: proxysql
  ports:
    - name: sql
      port: 3306             # Les apps utilisent le port standard 3306
      targetPort: 6033       # ProxySQL écoute sur 6033
    - name: admin
      port: 6032             # Port admin (pour debug/monitoring interne)
      targetPort: 6032

---
# =============================================================================
# 12. NETWORK POLICY - Isoler MySQL et ProxySQL
#
# Règle 1 : MySQL n'accepte de connexions QUE depuis ProxySQL
# Règle 2 : ProxySQL n'accepte de connexions SQL QUE depuis WordPress et PhpMyAdmin
# =============================================================================

# --- Policy 1 : MySQL accessible uniquement depuis ProxySQL ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mysql-allow-proxysql-only
  namespace: wordpress
spec:
  podSelector:
    matchLabels:
      app: mysql
  policyTypes:
    - Ingress
  ingress:
    # Autoriser ProxySQL → MySQL (port 3306)
    - from:
        - podSelector:
            matchLabels:
              app: proxysql
      ports:
        - protocol: TCP
          port: 3306
    # Autoriser MySQL → MySQL (communication MGR inter-membres port 33061)
    - from:
        - podSelector:
            matchLabels:
              app: mysql
      ports:
        - protocol: TCP
          port: 33061
        - protocol: TCP
          port: 3306    # aussi port 3306 pour Clone Plugin

---
# --- Policy 2 : ProxySQL accessible uniquement depuis WordPress et PhpMyAdmin ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: proxysql-allow-apps-only
  namespace: wordpress
spec:
  podSelector:
    matchLabels:
      app: proxysql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: wordpress
        - podSelector:
            matchLabels:
              app: phpmyadmin
      ports:
        - protocol: TCP
          port: 6033   # SQL
        - protocol: TCP
          port: 6032   # Admin (PhpMyAdmin ou debug)

---
# =============================================================================
# 13. HORIZONTAL POD AUTOSCALER (optionnel - pour scale automatique)
# ⚠️  Le scale du StatefulSet MySQL nécessite que REPLICAS dans les
#     ConfigMaps soit aussi mis à jour → à gérer via un Operator en production
# =============================================================================
# apiVersion: autoscaling/v2
# kind: HorizontalPodAutoscaler
