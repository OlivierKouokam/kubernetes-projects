#     name: mysql
#   minReplicas: 3
#   maxReplicas: 5
#   metrics:
#     - type: Resource
#       resource:
#         name: cpu
#         target:
#           type: Utilization
#           averageUtilization: 70

# =============================================================================
# FIN DU MANIFEST
# =============================================================================
# Déploiement :
#   kubectl apply -f mysql-ha-stack.yaml
#
# Vérification :
#   kubectl get pods -n wordpress -w
#   kubectl logs -n wordpress mysql-0 -c mgr-bootstrap
#   kubectl logs -n wordpress <proxysql-pod> -c proxysql-configurator
#
# Test du routage ProxySQL :
#   kubectl exec -n wordpress <proxysql-pod> -c proxysql -- \
#     mysql -u admin -pproxyadmin123 -h127.0.0.1 -P6032 \
#     -e "SELECT * FROM runtime_mysql_servers\G"
#
# Scale up (ajouter un replica) :
#   kubectl scale statefulset mysql --replicas=4 -n wordpress
#   # ⚠️ Mettre à jour REPLICAS=4 dans proxysql-configurator ConfigMap ensuite
# =============================================================================
